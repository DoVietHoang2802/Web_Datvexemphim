services:
  - type: web
    name: datvexemphim-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/movie-ticket-booking-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
      - key: SPRING_DATASOURCE_URL
        value: ${DATABASE_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${DB_USERNAME}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${DB_PASSWORD}
      - key: APP_JWT_SECRET
        value: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+_CHARS"
      - key: SERVER_PORT
        value: "10000"
