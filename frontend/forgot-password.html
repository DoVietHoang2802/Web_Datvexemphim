<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - DatVeXemPhim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #252538 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: rgba(40, 40, 60, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo h1 {
            color: #fff;
            font-size: 24px;
            margin-top: 10px;
        }
        .form-title {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .form-subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 45px;
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-group .input-icon {
            position: absolute;
            left: 16px;
            top: 42px;
            color: #666;
            font-size: 16px;
        }
        .form-group input:focus ~ .input-icon {
            color: #667eea;
        }
        .form-group .toggle-password {
            position: absolute;
            right: 16px;
            top: 42px;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }
        .form-group .toggle-password:hover {
            color: #667eea;
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #75b798;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ea8680;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .back-login {
            text-align: center;
            margin-top: 25px;
        }
        .back-login a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-login a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        .password-strength {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: #333;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }
        .strength-weak { width: 33%; background: #dc3545; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: #888;
        }
        .strength-text.weak { color: #dc3545; }
        .strength-text.medium { color: #ffc107; }
        .strength-text.strong { color: #28a745; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <i class="fas fa-film"></i>
            <h1>DatVeXemPhim</h1>
        </div>

        <h2 class="form-title">Đặt lại mật khẩu</h2>
        <p class="form-subtitle">Nhập email và họ tên đã đăng ký để đổi mật khẩu</p>

        <div id="alertSuccess" class="alert alert-success">
            <i class="fas fa-check-circle me-2"></i>
            <span id="successMessage"></span>
        </div>

        <div id="alertError" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="errorMessage"></span>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullName" placeholder="Nhập họ tên đầy đủ" required>
                <i class="fas fa-user input-icon"></i>
            </div>

            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" required>
                <i class="fas fa-lock input-icon"></i>
                <i class="fas fa-eye toggle-password" id="toggleNewPassword" onclick="togglePassword('newPassword')"></i>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu mới</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                <i class="fas fa-lock input-icon"></i>
                <i class="fas fa-eye toggle-password" id="toggleConfirmPassword" onclick="togglePassword('confirmPassword')"></i>
            </div>

            <button type="submit" class="btn-reset" id="btnSubmit">
                <i class="fas fa-key me-2"></i>Đổi mật khẩu
            </button>
        </form>

        <div class="back-login">
            <a href="login.html">
                <i class="fas fa-arrow-left me-2"></i>Quay lại đăng nhập
            </a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://webdatvexemphim-production.up.railway.app';

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById('toggle' + inputId.charAt(0).toUpperCase() + inputId.slice(1));

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Password strength checker
        document.getElementById('newPassword').addEventListener('input', function(e) {
            const password = e.target.value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            bar.className = 'password-strength-bar';
            text.className = 'strength-text';
            text.textContent = '';

            if (password.length === 0) {
                text.textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                bar.classList.add('strength-weak');
                text.classList.add('weak');
                text.textContent = 'Mật khẩu yếu';
            } else if (strength <= 3) {
                bar.classList.add('strength-medium');
                text.classList.add('medium');
                text.textContent = 'Mật khẩu trung bình';
            } else {
                bar.classList.add('strength-strong');
                text.classList.add('strong');
                text.textContent = 'Mật khẩu mạnh';
            }
        });

        // Handle form submit
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('btnSubmit');

            // Hide alerts
            document.getElementById('alertSuccess').style.display = 'none';
            document.getElementById('alertError').style.display = 'none';

            // Validate
            if (!email || !fullName || !newPassword || !confirmPassword) {
                document.getElementById('alertError').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Vui lòng điền đầy đủ thông tin.';
                return;
            }

            if (newPassword.length < 6) {
                document.getElementById('alertError').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                return;
            }

            if (newPassword !== confirmPassword) {
                document.getElementById('alertError').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Mật khẩu xác nhận không khớp.';
                return;
            }

            // Show loading
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Đang xử lý...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, fullName, newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('alertSuccess').style.display = 'block';
                    document.getElementById('successMessage').textContent = data.message;
                    document.getElementById('resetForm').innerHTML = `
                        <div style="text-align: center;">
                            <i class="fas fa-check-circle" style="font-size: 60px; color: #28a745; margin-bottom: 20px;"></i>
                            <h3 style="color: #fff; margin-bottom: 15px;">Thành công!</h3>
                            <p style="color: #aaa; margin-bottom: 25px;">Mật khẩu của bạn đã được đổi thành công.</p>
                            <a href="login.html" class="btn-reset" style="display: inline-block; text-decoration: none;">
                                <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập ngay
                            </a>
                        </div>
                    `;
                } else {
                    document.getElementById('alertError').style.display = 'block';
                    document.getElementById('errorMessage').textContent = data.message;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-key me-2"></i>Đổi mật khẩu';
                }
            } catch (error) {
                document.getElementById('alertError').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Không thể kết nối server. Vui lòng thử lại.';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key me-2"></i>Đổi mật khẩu';
            }
        });
    </script>
</body>
</html>
