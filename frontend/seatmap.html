<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chọn ghế</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div id="msg"></div>
    <div id="meta" class="mb-3"></div>

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="seat-legend">
          <span><i class="dot available"></i> Trống</span>
          <span><i class="dot selected"></i> Đang chọn</span>
          <span><i class="dot booked"></i> Đã đặt</span>
        </div>
        <div class="text-muted small">Màn hình</div>
      </div>
      <div class="mt-2 mb-3" style="height:8px;background:linear-gradient(90deg, transparent, rgba(148,163,184,.4), transparent);border-radius:999px"></div>
      <div id="seats" class="d-flex flex-wrap gap-2"></div>
    </div>

    <div class="card p-3 mt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <div class="text-muted small">Ghế đã chọn</div>
          <div class="fw-semibold" id="selectedSeats">—</div>
        </div>
        <div class="text-end">
          <div class="text-muted small">Tạm tính</div>
          <div class="fw-bold" id="total">0</div>
        </div>
      </div>
      <button id="btnBook" class="btn btn-brand mt-3">Đặt vé (giữ ghế)</button>
      <div class="text-muted small mt-2">Sau khi đặt, vé ở trạng thái <b>PENDING</b>. Chỉ khi thanh toán <b>SUCCESS</b> mới <b>CONFIRMED</b>.</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, getToken } from "./assets/js/api.js";
    import { qs, setupNavbar, formatVnd } from "./assets/js/app.js";

    let showtimeId = null;
    let price = 0;
    let selected = new Set();
    let seatData = [];

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }
    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }
    function render(){
      document.querySelector("#seats").innerHTML = seatData.map(s=>{
        const cls = ["seat", s.booked ? "booked" : "", selected.has(s.seatId) ? "selected" : ""].join(" ");
        return `<div class="${cls}" data-id="${s.seatId}" title="${s.seatCode}">${s.seatCode}</div>`;
      }).join("");
      const selectedSeats = seatData.filter(s=>selected.has(s.seatId)).map(s=>s.seatCode).join(", ");
      document.querySelector("#selectedSeats").textContent = selectedSeats || "—";
      document.querySelector("#total").textContent = formatVnd(price * selected.size);
    }

    async function main(){
      await loadNavbar();
      showtimeId = qs("showtimeId");
      if(!showtimeId){ show("Thiếu showtimeId"); return; }

      const map = await apiGet(`/seatmap/${showtimeId}`);
      seatData = map.seats;
      document.querySelector("#meta").innerHTML = `
        <div class="d-flex justify-content-between flex-wrap gap-2">
          <div>
            <h4 class="mb-0">Chọn ghế</h4>
            <div class="text-muted small">${map.roomName} · ${map.totalRows} hàng · ${map.totalCols} cột</div>
          </div>
          <a class="btn btn-outline-light btn-sm" href="showtimes.html">Đổi suất chiếu</a>
        </div>
      `;

      const showtimes = await apiGet("/showtimes");
      const st = showtimes.find(x => String(x.id) === String(showtimeId));
      price = st?.price || 0;

      render();

      document.querySelector("#seats").addEventListener("click", (e)=>{
        const el = e.target.closest(".seat");
        if(!el) return;
        const id = Number(el.dataset.id);
        const s = seatData.find(x=>x.seatId===id);
        if(!s || s.booked) return;
        if(selected.has(id)) selected.delete(id); else selected.add(id);
        render();
      });

      document.querySelector("#btnBook").addEventListener("click", async ()=>{
        try{
          if(!getToken()){
            location.href = `login.html?returnUrl=${encodeURIComponent(location.pathname + location.search)}`;
            return;
          }
          if(selected.size === 0){ show("Bạn chưa chọn ghế."); return; }
          const res = await apiPost("/bookings", { showtimeId: Number(showtimeId), seatIds: Array.from(selected) });
          const q = new URLSearchParams();
          q.set("ticketIds", res.ticketIds.join(","));
          q.set("amount", res.totalAmount);
          location.href = `food.html?${q.toString()}`;
        }catch(e){
          show(e.message);
          // refresh seatmap
          const map2 = await apiGet(`/seatmap/${showtimeId}`);
          seatData = map2.seats;
          selected = new Set();
          render();
        }
      });
    }
    main().catch(e=>show(e.message));
  </script>
</body>
</html>
