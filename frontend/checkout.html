<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thanh toán (mô phỏng)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .checkout-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .checkout-section-title {
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .checkout-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
    }
    .checkout-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .checkout-total-row {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      color: #fff;
      padding-top: 0.5rem;
      border-top: 2px solid rgba(255,255,255,0.1);
    }
    .voucher-input-group {
      display: flex;
      gap: 0.5rem;
    }
    .voucher-input-group .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }
    .voucher-input-group .form-control:focus {
      background: rgba(255,255,255,0.1);
      border-color: #667eea;
      color: #fff;
    }
    .voucher-success {
      background: rgba(72, 187, 120, 0.1);
      border: 1px solid rgba(72, 187, 120, 0.3);
      border-radius: 8px;
      padding: 0.75rem;
      margin-top: 0.5rem;
    }
    .discount-row {
      color: #48bb78 !important;
      font-weight: 600;
    }
    .payment-option {
      cursor: pointer;
      flex: 1;
      min-width: 150px;
    }
    .payment-option input {
      display: none;
    }
    .payment-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
      color: rgba(255,255,255,0.8);
    }
    .payment-card small {
      font-size: 0.75rem;
    }
    .payment-option input:checked + .payment-card {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.15);
      color: #fff;
    }
    .payment-option:hover .payment-card {
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4" style="max-width:760px">
    <!-- Back Button -->
    <div class="mb-3">
      <a class="btn btn-outline-light btn-sm" href="food.html">
        <i class="fas fa-arrow-left me-1"></i> Quay về
      </a>
    </div>

    <div id="msg"></div>
    <div class="card p-4" style="background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%); border: 1px solid rgba(255,255,255,0.08);">
      <h4 class="mb-1 text-white">Xác nhận thanh toán</h4>
      <div class="text-muted small">Kiểm tra lại thông tin trước khi thanh toán</div>
      <hr class="border-secondary"/>

      <!-- Tickets Section -->
      <div class="checkout-section">
        <div class="checkout-section-title">
          <i class="fas fa-ticket-alt" style="color: #667eea;"></i> Vé xem phim
        </div>
        <div id="ticketsInfo"></div>
        <div class="checkout-item" style="padding-top: 0.5rem;">
          <span>Tổng vé:</span>
          <span id="ticketsTotal" class="fw-bold"></span>
        </div>
      </div>

      <!-- Food Section (if any) -->
      <div id="foodSection" class="checkout-section" style="display:none;">
        <div class="checkout-section-title">
          <i class="fas fa-utensils" style="color: #9f7aea;"></i> Đồ ăn & nước uống
        </div>
        <div id="foodInfo"></div>
        <div class="checkout-item" style="padding-top: 0.5rem;">
          <span>Tổng đồ ăn:</span>
          <span id="foodTotal" class="fw-bold"></span>
        </div>
      </div>

      <!-- Voucher Section -->
      <div class="checkout-section">
        <div class="checkout-section-title">
          <i class="fas fa-tags" style="color: #ed8936;"></i> Mã giảm giá
        </div>
        <div class="voucher-input-group">
          <input type="text" class="form-control" id="voucherCode" placeholder="Nhập mã voucher...">
          <button class="btn btn-outline-light" id="btnApplyVoucher">Áp dụng</button>
        </div>
        <div id="voucherResult"></div>
      </div>

      <!-- Payment Method -->
      <div class="checkout-section">
        <div class="checkout-section-title">
          <i class="fas fa-credit-card" style="color: #48bb78;"></i> Phương thức thanh toán
        </div>
        <div class="d-flex gap-3 flex-wrap">
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="simulate" id="paySimulate" checked>
            <div class="payment-card">
              <i class="fas fa-check-circle text-success"></i>
              <span>Thanh toán mô phỏng</span>
              <small class="text-muted d-block">Test không mất tiền</small>
            </div>
          </label>
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="vnpay" id="payVnpay">
            <div class="payment-card">
              <img src="https://vnpay.vn/wp-content/uploads/2020/07/Logo-VNPAY@2x.png" alt="VNPay" style="height:24px;">
              <span>VNPay</span>
              <small class="text-muted d-block">Thanh toán thật (Sandbox)</small>
            </div>
          </label>
        </div>
      </div>

      <!-- Grand Total -->
      <div class="checkout-total-row mb-3 p-3" style="background: rgba(102, 126, 234, 0.2); border-radius: 0.5rem;">
        <span>TỔNG CỘNG:</span>
        <span id="totalAmount" style="color: #667eea; font-size: 1.1rem;"></span>
      </div>

      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-brand" id="btnPay">
          <i class="fas fa-lock me-2"></i>Thanh toán
        </button>
        <button class="btn btn-outline-danger" id="btnFail">Thanh toán FAILED</button>
        <a class="btn btn-outline-light ms-auto" href="seatmap.html">Quay lại</a>
      </div>
      <div class="text-muted small mt-3">
        <i class="fas fa-info-circle"></i> Nếu FAILED: hệ thống sẽ <b>mở lại ghế</b> (xóa ticket PENDING).
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, createFoodOrder } from "./assets/js/api.js";
    import { qs, formatVnd, formatTime, formatDate, setupNavbar, requireAuth } from "./assets/js/app.js";

    let ticketIds = [];
    let foodItems = [];
    let ticketAmount = 0;
    let foodAmount = 0;
    let appliedVoucher = null;
    let discountAmount = 0;
    let ticketDetails = []; // lưu chi tiết vé từ API

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function updateTotal() {
      const subtotal = ticketAmount + foodAmount;
      const grandTotal = Math.max(0, subtotal - discountAmount);
      document.querySelector("#totalAmount").textContent = formatVnd(grandTotal);
    }

    function getSelectedPayment() {
      const selected = document.querySelector('input[name="paymentMethod"]:checked');
      return selected ? selected.value : 'simulate';
    }

    function renderCheckout(){
      // Nếu có chi tiết vé từ API thì hiển thị đầy đủ
      if (ticketDetails.length > 0) {
        let totalTicket = 0;
        const ticketsHtml = ticketDetails.map(t => {
          const price = t.price || 0;
          totalTicket += price;
          return `
            <div class="checkout-item flex-column align-items-start">
              <div class="w-100 d-flex justify-content-between">
                <span class="fw-bold text-white">${t.movieTitle}</span>
                <span class="fw-bold text-success">${formatVnd(price)}</span>
              </div>
              <div class="small text-muted w-100">
                <div><i class="fas fa-clock me-1"></i>${formatDate(t.startTime)} · ${formatTime(t.startTime)}</div>
                <div><i class="fas fa-door-open me-1"></i>${t.roomName}</div>
                <div><i class="fas fa-couch me-1"></i>Ghế: <span class="text-warning fw-bold">${t.seatCode}</span></div>
              </div>
            </div>
          `;
        }).join("");
        document.querySelector("#ticketsInfo").innerHTML = ticketsHtml;
        ticketAmount = totalTicket;
        document.querySelector("#ticketsTotal").textContent = formatVnd(ticketAmount);
      } else {
        // Fallback: hiển thị đơn giản
        document.querySelector("#ticketsInfo").innerHTML = ticketIds.map(id =>
          `<div class="checkout-item"><span>Vé ID: ${id}</span></div>`
        ).join("");
        document.querySelector("#ticketsTotal").textContent = formatVnd(ticketAmount);
      }

      // Food - nhận cả 2 format: [{id, name, price, quantity}] hoặc Map stored as array
      if(foodItems.length > 0){
        const foodDetailsMap = new Map();
        foodItems.forEach(item => {
          // Xác định format: có 'quantity' hay 'qty'
          const itemId = item.id || item.itemId;
          const qty = item.quantity || item.qty || 1;
          const name = item.name;
          const price = item.price;

          if(!foodDetailsMap.has(itemId)){
            foodDetailsMap.set(itemId, { id: itemId, name, price, quantity: 0 });
          }
          foodDetailsMap.get(itemId).quantity += qty;
        });

        let foodHtml = "";
        let totalFood = 0;
        foodDetailsMap.forEach(item => {
          const itemTotal = item.price * item.quantity;
          totalFood += itemTotal;
          foodHtml += `
            <div class="checkout-item">
              <span>${item.name} ×${item.quantity}</span>
              <span>${formatVnd(itemTotal)}</span>
            </div>
          `;
        });
        document.querySelector("#foodInfo").innerHTML = foodHtml;
        document.querySelector("#foodTotal").textContent = formatVnd(totalFood);
        document.querySelector("#foodSection").style.display = "block";
        foodAmount = totalFood;
      }

      updateTotal();
    }

    // Apply voucher
    document.querySelector("#btnApplyVoucher")?.addEventListener("click", async () => {
      const code = document.querySelector("#voucherCode").value.trim();
      if (!code) {
        show("Vui lòng nhập mã voucher!");
        return;
      }

      const orderAmount = ticketAmount + foodAmount;

      try {
        const res = await apiPost("/vouchers/validate", {
          voucherCode: code,
          orderAmount: orderAmount
        });

        if (res.valid) {
          appliedVoucher = {
            code: res.code,
            discountAmount: res.discountAmount
          };
          discountAmount = res.discountAmount;

          document.querySelector("#voucherResult").innerHTML = `
            <div class="voucher-success">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <i class="fas fa-check-circle text-success me-2"></i>
                  <span class="text-success fw-bold">${res.code}</span>
                  <span class="text-muted ms-2">- ${formatVnd(res.discountAmount)}</span>
                </div>
                <button class="btn btn-sm btn-outline-danger" id="btnRemoveVoucher">
                  <i class="fas fa-times"></i>
                </button>
              </div>
              <div class="small text-muted mt-1">${res.description}</div>
            </div>
          `;

          document.querySelector("#btnRemoveVoucher")?.addEventListener("click", () => {
            appliedVoucher = null;
            discountAmount = 0;
            document.querySelector("#voucherResult").innerHTML = "";
            document.querySelector("#voucherCode").value = "";
            updateTotal();
          });

          updateTotal();
          show("Áp dụng voucher thành công!", "success");
        }
      } catch (e) {
        show(e.message);
        appliedVoucher = null;
        discountAmount = 0;
        document.querySelector("#voucherResult").innerHTML = "";
        updateTotal();
      }
    });

    async function pay(success = true){
      try{
        const grandTotal = Math.max(0, ticketAmount + foodAmount - discountAmount);
        const paymentMethod = getSelectedPayment();

        // Nếu chọn VNPay
        if (paymentMethod === 'vnpay') {
          // Tính foodAmount từ foodItems
          let totalFood = 0;
          foodItems.forEach(item => {
            const qty = item.quantity || item.qty || 1;
            const price = item.price || 0;
            totalFood += price * qty;
          });

          // Lưu thông tin vào sessionStorage trước khi redirect
          sessionStorage.setItem('pendingTickets', JSON.stringify({
            ticketIds,
            foodItems,
            discountAmount,
            ticketAmount,
            foodAmount: totalFood
          }));

          // Disable nút tránh click nhiều lần
          const btnPay = document.querySelector("#btnPay");
          btnPay.disabled = true;
          btnPay.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Đang chuyển sang VNPay...';

          // Gọi API tạo URL thanh toán VNPay
          const res = await apiPost("/payments/vnpay/create", {
            amount: grandTotal,
            ticketIds: ticketIds.join(',')
          });

          console.log("VNPay URL:", res.paymentUrl);

          // Redirect sang VNPay
          window.location.href = res.paymentUrl;
          return;
        }

        // Thanh toán mô phỏng
        const btnPay = document.querySelector("#btnPay");
        const btnFail = document.querySelector("#btnFail");
        btnPay.disabled = true;
        btnFail.disabled = true;

        const res = await apiPost("/payments/simulate", { ticketIds, success });

        // Tạo food order sau khi thanh toán thành công
        if(success && foodItems.length > 0){
          try{
            const apiFood = foodItems.map(item => ({
              foodItemId: item.id,
              quantity: item.quantity || item.qty || 1
            }));
            await createFoodOrder(apiFood, ticketIds[0], res.paymentId);
          }catch(e){
            console.warn("Food order failed:", e);
            // Không crash, chỉ warning
          }
        }

        show(`✓ ${success ? "Thanh toán thành công!" : "Thanh toán thất bại"} · ${res.bookingCode ? "Mã: " + res.bookingCode : ""}`, success ? "success" : "warning");
        setTimeout(()=>location.href="tickets.html", success ? 1500 : 800);
      }catch(e){
        show("❌ Lỗi: " + e.message);
        document.querySelector("#btnPay").disabled = false;
        document.querySelector("#btnPay").innerHTML = '<i class="fas fa-lock me-2"></i>Thanh toán';
        document.querySelector("#btnFail").disabled = false;
      }
    }

    async function loadFoodItems(){
      const foodParam = qs("foodItems") || "";
      if(!foodParam) return;

      const pairs = foodParam.split("|");
      const itemIds = [];
      pairs.forEach(pair => {
        const [id, qty] = pair.split(":").map(Number);
        itemIds.push(id);
      });

      if(itemIds.length === 0) return;

      try{
        const allItems = await apiGet("/food/items");
        pairs.forEach(pair => {
          const [id, qty] = pair.split(":").map(Number);
          const item = allItems.find(x => x.id === id);
          if(item){
            foodItems.push({
              id: item.id,
              name: item.name,
              price: item.price,
              quantity: qty
            });
          }
        });
      }catch(e){
        console.warn("Could not load food items:", e);
      }
    }

    async function main(){
      requireAuth();
      await loadNavbar();

      // Kiểm tra return từ VNPay
      const urlParams = new URLSearchParams(window.location.search);
      const vnp_ResponseCode = urlParams.get('vnp_ResponseCode');

      if (vnp_ResponseCode) {
        // Xử lý return từ VNPay
        const pendingData = sessionStorage.getItem('pendingTickets');

        if (pendingData) {
          const data = JSON.parse(pendingData);
          ticketIds = data.ticketIds || [];
          foodItems = data.foodItems || [];
          discountAmount = data.discountAmount || 0;
          ticketAmount = data.ticketAmount || 0;
          foodAmount = data.foodAmount || 0;

          if (vnp_ResponseCode === '00') {
            // Thanh toán thành công
            show("✓ Thanh toán VNPay thành công! Đang xử lý...", "success");
            sessionStorage.removeItem('pendingTickets');
            sessionStorage.removeItem('pendingAmount');
            await pay(true);
          } else {
            // Thanh toán thất bại
            show("❌ Thanh toán VNPay thất bại (Mã lỗi: " + vnp_ResponseCode + ")", "danger");
            document.querySelector("#btnFail").style.display = 'inline-block';
            sessionStorage.removeItem('pendingTickets');
            sessionStorage.removeItem('pendingAmount');
          }
        }
      }

      const raw = qs("ticketIds") || "";
      if (ticketIds.length === 0) {
        ticketIds = raw.split(",").map(x=>Number(x)).filter(Boolean);
      }

      if(!ticketIds.length){
        show("Thiếu ticketIds.");
        return;
      }

      // Load chi tiết vé từ API để hiển thị đầy đủ thông tin
      if (ticketIds.length > 0) {
        try {
          ticketDetails = await apiGet(`/tickets?ticketIds=${ticketIds.join(",")}`);
          // ticketAmount sẽ được tính trong renderCheckout từ ticketDetails
        } catch(e) {
          console.warn("Không load được chi tiết vé:", e);
        }
      }

      // Nếu có amount trong URL (từ seatmap) thì dùng, không thì tính từ API
      const urlAmount = Number(qs("amount") || "0");
      if (urlAmount > 0) {
        ticketAmount = urlAmount;
      } else if (ticketDetails.length > 0) {
        ticketAmount = ticketDetails.reduce((sum, t) => sum + (t.price || 0), 0);
      }

      await loadFoodItems();
      renderCheckout();

      document.querySelector("#btnPay").addEventListener("click", ()=>pay(true).catch(e=>show(e.message)));
      document.querySelector("#btnFail")?.addEventListener("click", ()=>pay(false).catch(e=>show(e.message)));
    }

    main().catch(e=>show(e.message));
  </script>
</body>
</html>
