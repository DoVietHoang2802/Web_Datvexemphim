<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thanh toán (mô phỏng)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .checkout-section {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .checkout-section-title {
      font-weight: bold;
      color: #1e293b;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .checkout-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      color: #000; /* thêm dòng này */
    }
    .checkout-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .checkout-total-row {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      color: #1e293b;
      padding-top: 0.5rem;
      border-top: 2px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4" style="max-width:760px">
    <div id="msg"></div>
    <div class="card p-4">
      <h4 class="mb-1">Xác nhận thanh toán</h4>
      <div class="text-muted small">Kiểm tra lại thông tin trước khi thanh toán</div>
      <hr class="border-secondary"/>

      <!-- Tickets Section -->
      <div class="checkout-section">
        <div class="checkout-section-title">
          <i class="fas fa-ticket"></i> Vé xem phim
        </div>
        <div id="ticketsInfo"></div>
        <div class="checkout-item" style="padding-top: 0.5rem;">
          <span>Tổng vé:</span>
          <span id="ticketsTotal" class="fw-bold"></span>
        </div>
      </div>

      <!-- Food Section (if any) -->
      <div id="foodSection" class="checkout-section" style="display:none;">
        <div class="checkout-section-title">
          <i class="fas fa-utensils"></i> Đồ ăn & nước uống
        </div>
        <div id="foodInfo"></div>
        <div class="checkout-item" style="padding-top: 0.5rem;">
          <span>Tổng đồ ăn:</span>
          <span id="foodTotal" class="fw-bold"></span>
        </div>
      </div>

      <!-- Grand Total -->
      <div class="checkout-total-row mb-3 p-3" style="background: #fef2f2; border-radius: 0.5rem;">
        <span>TỔNG CỘNG:</span>
        <span id="totalAmount" style="color: #dc2626; font-size: 1.1rem;"></span>
      </div>

      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-brand" id="btnSuccess">Thanh toán SUCCESS</button>
        <button class="btn btn-outline-danger" id="btnFail">Thanh toán FAILED</button>
        <a class="btn btn-outline-light ms-auto" href="seatmap.html">Quay lại</a>
      </div>
      <div class="text-muted small mt-3">
        <i class="fas fa-info-circle"></i> Nếu FAILED: hệ thống sẽ <b>mở lại ghế</b> (xóa ticket PENDING).
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, createFoodOrder } from "./assets/js/api.js";
    import { qs, formatVnd, setupNavbar, requireAuth } from "./assets/js/app.js";

    let ticketIds = [];
    let foodItems = [];
    let ticketAmount = 0;
    let foodAmount = 0;

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function renderCheckout(){
      // Tickets
      document.querySelector("#ticketsInfo").innerHTML = ticketIds.map(id => 
        `<div class="checkout-item"><span>Vé ID: ${id}</span></div>`
      ).join("");
      document.querySelector("#ticketsTotal").textContent = formatVnd(ticketAmount);

      // Food
      if(foodItems.length > 0){
        const foodDetailsMap = new Map();
        foodItems.forEach(item => {
          const [itemId, qty] = [item.id, item.quantity];
          if(!foodDetailsMap.has(itemId)){
            foodDetailsMap.set(itemId, { ...item, quantity: 0 });
          }
          foodDetailsMap.get(itemId).quantity += qty;
        });

        let foodHtml = "";
        let totalFood = 0;
        foodDetailsMap.forEach(item => {
          const itemTotal = item.price * item.quantity;
          totalFood += itemTotal;
          foodHtml += `
            <div class="checkout-item">
              <span>${item.name} ×${item.quantity}</span>
              <span>${formatVnd(itemTotal)}</span>
            </div>
          `;
        });
        document.querySelector("#foodInfo").innerHTML = foodHtml;
        document.querySelector("#foodTotal").textContent = formatVnd(totalFood);
        document.querySelector("#foodSection").style.display = "block";
        foodAmount = totalFood;
      }

      // Total
      const grandTotal = ticketAmount + foodAmount;
      document.querySelector("#totalAmount").textContent = formatVnd(grandTotal);
    }

    async function pay(success){
      try{
        // Disable buttons
        document.querySelector("#btnSuccess").disabled = true;
        document.querySelector("#btnFail").disabled = true;
        
        const res = await apiPost("/payments/simulate", { ticketIds, success });
        
        // If payment success, create food order (only if payment succeeded)
        if(success && foodItems.length > 0){
          try{
            // Map foodItems to API format
            const apiFood = foodItems.map(item => ({
              id: item.id,
              quantity: item.quantity
            }));
            // Create food order with paymentId and first ticketId
            await createFoodOrder(apiFood, ticketIds[0], res.paymentId);
          }catch(e){
            console.warn("Food order failed:", e);
            // Food order failed, nhưng vé đã confirm - warn user
            show(`✓ Thanh toán vé thành công (ID: ${ticketIds.join(', ')}) nhưng đặt đồ ăn lỗi. Bạn có thể đặt sau.`, "warning");
            setTimeout(()=>location.href="tickets.html", 2000);
            return;
          }
        }

        show(`✓ ${success ? "Thanh toán thành công!" : "Thanh toán thất bại"} · ${res.bookingCode ? "Mã: " + res.bookingCode : ""}`, success ? "success" : "warning");
        setTimeout(()=>location.href="tickets.html", success ? 1000 : 800);
      }catch(e){
        show("❌ Lỗi: " + e.message);
        document.querySelector("#btnSuccess").disabled = false;
        document.querySelector("#btnFail").disabled = false;
      }
    }

    async function loadFoodItems(){
      const foodParam = qs("foodItems") || "";
      if(!foodParam) return;

      const pairs = foodParam.split("|");
      const itemIds = [];
      pairs.forEach(pair => {
        const [id, qty] = pair.split(":").map(Number);
        itemIds.push(id);
      });

      if(itemIds.length === 0) return;

      try{
        const allItems = await apiGet("/food/items");
        pairs.forEach(pair => {
          const [id, qty] = pair.split(":").map(Number);
          const item = allItems.find(x => x.id === id);
          if(item){
            foodItems.push({
              id: item.id,
              name: item.name,
              price: item.price,
              quantity: qty
            });
          }
        });
      }catch(e){
        console.warn("Could not load food items:", e);
      }
    }

    async function main(){
      requireAuth();
      await loadNavbar();
      
      const raw = qs("ticketIds") || "";
      ticketIds = raw.split(",").map(x=>Number(x)).filter(Boolean);
      ticketAmount = Number(qs("amount") || "0");

      if(!ticketIds.length){ 
        show("Thiếu ticketIds."); 
        return; 
      }

      await loadFoodItems();
      renderCheckout();

      document.querySelector("#btnSuccess").addEventListener("click", ()=>pay(true).catch(e=>show(e.message)));
      document.querySelector("#btnFail").addEventListener("click", ()=>pay(false).catch(e=>show(e.message)));
    }

    main().catch(e=>show(e.message));
  </script>
</body>
</html>
