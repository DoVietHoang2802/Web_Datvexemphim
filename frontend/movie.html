<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chi tiết phim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .movie-poster {
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .movie-section-title {
      color: #fff;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .movie-section-title i {
      color: #ff0000;
    }
    @media (max-width: 768px) {
      .video-container {
        padding-bottom: 75%;
      }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div id="msg"></div>
    <div id="movie"></div>
    <hr class="border-secondary"/>
    <h5>Lịch chiếu sắp tới</h5>
    <div id="showtimes" class="row g-2"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet } from "./assets/js/api.js";
    import { qs, formatTime, formatVnd, setupNavbar } from "./assets/js/app.js";

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    // Trích xuất video ID từ YouTube URL
    function getYouTubeId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
        /^([a-zA-Z0-9_-]{11})$/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      return null;
    }

    function renderMovie(m){
      const poster = m.posterUrl || "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=900";
      document.title = m.title;

      // Tạo embed video nếu có trailer
      let trailerHtml = '';
      const videoId = getYouTubeId(m.trailerUrl);
      if (videoId) {
        trailerHtml = `
          <div class="mt-4">
            <h6 class="movie-section-title">
              <i class="fab fa-youtube"></i> Trailer
            </h6>
            <div class="video-container">
              <iframe
                src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1"
                title="${m.title} Trailer"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            </div>
          </div>
        `;
      }

      document.querySelector("#movie").innerHTML = `
        <div class="row g-4 align-items-start">
          <div class="col-md-4">
            <img class="movie-poster w-100" src="${poster}" alt="${m.title}">
          </div>
          <div class="col-md-8">
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <h3 class="mb-0">${m.title}</h3>
              <span class="badge badge-soft">${m.rating || "N/A"}</span>
              ${m.genre ? `<span class="badge bg-info">${m.genre}</span>` : ''}
            </div>
            <div class="text-muted mt-1">${m.durationMinutes} phút</div>
            <p class="mt-3">${m.description || ""}</p>
            ${trailerHtml}
          </div>
        </div>
      `;
    }

    function renderShowtimes(list){
      if(!list.length){
        document.querySelector("#showtimes").innerHTML = `<div class="col-12"><div class="text-muted">Chưa có lịch chiếu.</div></div>`;
        return;
      }
      document.querySelector("#showtimes").innerHTML = list.map(s=>`
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card p-3 h-100">
            <div class="fw-semibold">${formatTime(s.startTime)}</div>
            <div class="text-muted small">${s.roomName} · ${formatVnd(s.price)}</div>
            <a class="btn btn-sm btn-brand mt-2" href="seatmap.html?showtimeId=${s.id}">Chọn ghế</a>
          </div>
        </div>
      `).join("");
    }

    async function main(){
      await loadNavbar();
      const id = qs("id");
      if(!id){ show("Thiếu id phim."); return; }
      const m = await apiGet(`/movies/${id}`);
      renderMovie(m);
      const showtimes = await apiGet(`/showtimes/movie/${id}`);
      renderShowtimes(showtimes);
    }
    main().catch(e=>show(e.message));
  </script>
</body>
</html>
