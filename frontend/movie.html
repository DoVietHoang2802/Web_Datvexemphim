<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chi tiết phim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .movie-poster {
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .movie-section-title {
      color: #fff;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .movie-section-title i {
      color: #ff0000;
    }
    /* Review Styles */
    .review-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .review-card:hover {
      background: rgba(255,255,255,0.06);
    }
    .review-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    .review-rating {
      color: #ffc107;
    }
    .rating-stats {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .rating-number {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
    }
    .rating-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .rating-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
    }
    .star-rating {
      font-size: 1.5rem;
      cursor: pointer;
      color: #4a4a5a;
      transition: color 0.2s;
    }
    .star-rating.active,
    .star-rating:hover {
      color: #ffc107;
    }
    .star-rating-input {
      font-size: 2rem;
    }
    .star-rating-input:hover,
    .star-rating-input.active {
      color: #ffc107;
      transform: scale(1.1);
    }
    @media (max-width: 768px) {
      .video-container {
        padding-bottom: 75%;
      }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div id="msg"></div>
    <div id="movie"></div>
    <hr class="border-secondary"/>

    <!-- Reviews Section -->
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="rating-stats" id="ratingStats">
          <div class="text-center mb-3">
            <div class="rating-number" id="avgRating">—</div>
            <div class="review-rating" id="avgStars">—</div>
            <div class="text-muted small" id="totalReviews">0 đánh giá</div>
          </div>
          <div id="ratingDistribution"></div>
        </div>
      </div>
      <div class="col-lg-8">
        <!-- Review Form -->
        <div class="mb-4" id="reviewFormContainer">
          <h6 class="movie-section-title">
            <i class="fas fa-pen"></i> Đánh giá của bạn
          </h6>
          <div class="review-card" id="reviewForm">
            <div class="mb-3">
              <div class="star-rating-input d-flex gap-1" id="starInput">
                <i class="fas fa-star star-rating-input" data-rating="1"></i>
                <i class="fas fa-star star-rating-input" data-rating="2"></i>
                <i class="fas fa-star star-rating-input" data-rating="3"></i>
                <i class="fas fa-star star-rating-input" data-rating="4"></i>
                <i class="fas fa-star star-rating-input" data-rating="5"></i>
              </div>
              <input type="hidden" id="selectedRating" value="0">
            </div>
            <div class="mb-3">
              <textarea class="form-control" id="reviewComment" rows="3" placeholder="Chia sẻ cảm nhận của bạn về phim này..."></textarea>
            </div>
            <button class="btn btn-brand" id="btnSubmitReview">Gửi đánh giá</button>
          </div>
          <div class="text-muted small mt-2" id="loginPrompt">
            <a href="login.html">Đăng nhập</a> để đánh giá phim
          </div>
        </div>

        <!-- Reviews List -->
        <h6 class="movie-section-title">
          <i class="fas fa-comments"></i> Đánh giá
        </h6>
        <div id="reviewsList"></div>
      </div>
    </div>

    <hr class="border-secondary"/>
    <h5>Lịch chiếu sắp tới</h5>
    <div id="showtimes" class="row g-2"></div>
  </main>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, apiDelete, getToken } from "./assets/js/api.js";
    import { qs, formatTime, formatVnd, setupNavbar, requireAuth } from "./assets/js/app.js";

    let movieId = null;
    let currentRating = 0;

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function getYouTubeId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
        /^([a-zA-Z0-9_-]{11})$/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      return null;
    }

    function renderMovie(m){
      const poster = m.posterUrl || "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=900";
      document.title = m.title;

      let trailerHtml = '';
      const videoId = getYouTubeId(m.trailerUrl);
      if (videoId) {
        trailerHtml = `
          <div class="mt-4">
            <h6 class="movie-section-title">
              <i class="fab fa-youtube"></i> Trailer
            </h6>
            <div class="video-container">
              <iframe
                src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1"
                title="${m.title} Trailer"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            </div>
          </div>
        `;
      }

      document.querySelector("#movie").innerHTML = `
        <div class="row g-4 align-items-start">
          <div class="col-md-4">
            <img class="movie-poster w-100" src="${poster}" alt="${m.title}">
          </div>
          <div class="col-md-8">
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <h3 class="mb-0">${m.title}</h3>
              <span class="badge badge-soft">${m.rating || "N/A"}</span>
              ${m.genre ? `<span class="badge bg-info">${m.genre}</span>` : ''}
            </div>
            <div class="text-muted mt-1">${m.durationMinutes} phút</div>
            <p class="mt-3">${m.description || ""}</p>
            ${trailerHtml}
          </div>
        </div>
      `;
    }

    function renderShowtimes(list){
      if(!list.length){
        document.querySelector("#showtimes").innerHTML = `<div class="col-12"><div class="text-muted">Chưa có lịch chiếu.</div></div>`;
        return;
      }
      document.querySelector("#showtimes").innerHTML = list.map(s=>`
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card p-3 h-100">
            <div class="fw-semibold">${formatTime(s.startTime)}</div>
            <div class="text-muted small">${s.roomName} · ${formatVnd(s.price)}</div>
            <a class="btn btn-sm btn-brand mt-2" href="seatmap.html?showtimeId=${s.id}">Chọn ghế</a>
          </div>
        </div>
      `).join("");
    }

    function renderRatingStats(stats) {
      const avg = stats.averageRating || 0;
      const total = stats.totalReviews || 0;
      const dist = stats.ratingDistribution || {};

      document.querySelector("#avgRating").textContent = avg.toFixed(1);
      document.querySelector("#avgStars").innerHTML = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));
      document.querySelector("#totalReviews").textContent = `${total} đánh giá`;

      // Rating distribution bars
      let distHtml = '';
      for (let i = 5; i >= 1; i--) {
        const count = dist[i] || 0;
        const percent = total > 0 ? (count / total * 100) : 0;
        distHtml += `
          <div class="d-flex align-items-center gap-2 mb-2">
            <span class="small text-muted" style="width: 20px;">${i} ★</span>
            <div class="rating-bar flex-fill">
              <div class="rating-bar-fill" style="width: ${percent}%"></div>
            </div>
            <span class="small text-muted" style="width: 30px;">${count}</span>
          </div>
        `;
      }
      document.querySelector("#ratingDistribution").innerHTML = distHtml;
    }

    function renderReviews(reviews) {
      if (!reviews.length) {
        document.querySelector("#reviewsList").innerHTML = `
          <div class="text-center text-muted py-4">
            <i class="fas fa-comments fa-2x mb-2 opacity-50"></i>
            <div>Chưa có đánh giá nào</div>
          </div>
        `;
        return;
      }

      document.querySelector("#reviewsList").innerHTML = reviews.map(r => {
        const initial = r.userName ? r.userName.charAt(0).toUpperCase() : '?';
        const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);

        return `
          <div class="review-card">
            <div class="d-flex gap-3">
              <div class="review-avatar">${initial}</div>
              <div class="flex-fill">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <div class="fw-semibold text-white">${r.userName}</div>
                    <div class="review-rating small">${stars}</div>
                  </div>
                  <div class="text-muted small">${formatTime(r.createdAt)}</div>
                </div>
                ${r.comment ? `<div class="mt-2 text-light">${r.comment}</div>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Star rating input
    document.querySelector("#starInput")?.addEventListener("mouseover", (e) => {
      if (e.target.classList.contains("star-rating-input")) {
        const rating = parseInt(e.target.dataset.rating);
        document.querySelectorAll("#starInput .star-rating-input").forEach((star, i) => {
          star.classList.toggle("active", i < rating);
        });
      }
    });

    document.querySelector("#starInput")?.addEventListener("click", (e) => {
      if (e.target.classList.contains("star-rating-input")) {
        const rating = parseInt(e.target.dataset.rating);
        currentRating = rating;
        document.querySelector("#selectedRating").value = rating;
        document.querySelectorAll("#starInput .star-rating-input").forEach((star, i) => {
          star.classList.toggle("active", i < rating);
        });
      }
    });

    document.querySelector("#starInput")?.addEventListener("mouseout", () => {
      document.querySelectorAll("#starInput .star-rating-input").forEach((star, i) => {
        star.classList.toggle("active", i < currentRating);
      });
    });

    // Submit review
    document.querySelector("#btnSubmitReview")?.addEventListener("click", async () => {
      const rating = parseInt(document.querySelector("#selectedRating").value);
      const comment = document.querySelector("#reviewComment").value;

      if (!rating) {
        show("Vui lòng chọn số sao!");
        return;
      }

      try {
        await apiPost("/movies/reviews", {
          movieId: movieId,
          rating: rating,
          comment: comment
        });
        show("Cảm ơn bạn đã đánh giá!", "success");
        document.querySelector("#reviewComment").value = "";
        currentRating = 0;
        document.querySelector("#selectedRating").value = 0;
        document.querySelectorAll("#starInput .star-rating-input").forEach(s => s.classList.remove("active"));

        // Reload reviews
        loadReviews();
      } catch (e) {
        show(e.message);
      }
    });

    async function loadReviews() {
      try {
        const reviews = await apiGet(`/movies/${movieId}/reviews`);
        renderReviews(reviews);

        const stats = await apiGet(`/movies/${movieId}/reviews/stats`);
        renderRatingStats(stats);
      } catch (e) {
        console.log("No reviews");
      }
    }

    async function main(){
      await loadNavbar();
      movieId = qs("id");
      if(!movieId){ show("Thiếu id phim."); return; }

      const m = await apiGet(`/movies/${movieId}`);
      renderMovie(m);

      const showtimes = await apiGet(`/showtimes/movie/${movieId}`);
      renderShowtimes(showtimes);

      // Check login
      const token = getToken();
      if (token) {
        document.querySelector("#reviewForm").style.display = "block";
        document.querySelector("#loginPrompt").style.display = "none";
      } else {
        document.querySelector("#reviewForm").style.display = "none";
        document.querySelector("#loginPrompt").style.display = "block";
      }

      await loadReviews();
    }
    main().catch(e=>show(e.message));
  </script>
</body>
</html>
