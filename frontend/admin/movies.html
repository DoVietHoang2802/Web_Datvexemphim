<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Movies</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <style>
    .table thead th {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      font-weight: 500;
      border: none;
    }
    .table tbody tr:hover {
      background: rgba(0,0,0,0.05);
    }
    .card {
      border: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-radius: 12px;
    }
    .btn-group .btn {
      border-radius: 6px !important;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-1">🎬 Quản lý phim</h4>
        <p class="text-muted mb-0 small">Quản lý danh sách phim và thể loại</p>
      </div>
      <button class="btn btn-brand btn-sm" id="btnAdd">
        <i class="fas fa-plus"></i> Thêm phim
      </button>
    </div>
    <div id="msg"></div>
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th style="width:60px;">ID</th>
              <th>Tên phim</th>
              <th style="width:150px;">Thể loại</th>
              <th style="width:100px;">Thời lượng</th>
              <th style="width:100px;">Trạng thái</th>
              <th style="width:100px;" class="text-end">Tác vụ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, apiPut, apiDelete } from "../assets/js/api.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";
    import { showMovieModal, showConfirmModal } from "./modals.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function row(m){
      // Hiển thị genre - ưu tiên genreName nếu có
      const genreDisplay = m.genreName ? `<span class="badge bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">${m.genreName}</span>` : '<span class="badge bg-secondary">-</span>';
      return `
        <tr>
          <td><span class="text-muted">#${m.id}</span></td>
          <td>
            <div class="d-flex align-items-center gap-2">
              ${m.posterUrl ? `<img src="${m.posterUrl}" width="40" height="60" style="object-fit:cover;border-radius:4px;">` : '<div style="width:40px;height:60px;background:#333;border-radius:4px;"></div>'}
              <strong>${m.title}</strong>
            </div>
          </td>
          <td>${genreDisplay}</td>
          <td><span class="badge bg-dark">${m.durationMinutes} phút</span></td>
          <td><span class="badge ${m.active ? 'bg-success' : 'bg-danger'}">${m.active ? "Hoạt động" : "Khóa"}</span></td>
          <td class="text-end">
            <div class="btn-group">
              <button class="btn btn-sm btn-outline-primary" data-action="edit" data-id="${m.id}" title="Sửa"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-outline-danger" data-action="del" data-id="${m.id}" title="Xóa"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>
      `;
    }

    async function refresh(){
      const list = await apiGet("/admin/movies");
      document.querySelector("#tbody").innerHTML = list.map(row).join("") || `<tr><td colspan="5" class="text-muted">Không có dữ liệu</td></tr>`;
    }

    async function main(){
      requireAdmin();
      await loadAdminNavbar();
      await refresh();

      document.querySelector("#btnAdd").addEventListener("click", ()=>{
        showMovieModal(null, async (data) => {
          try{
            await apiPost("/admin/movies", data);
            show("✅ Đã thêm phim.", "success");
            await refresh();
          }catch(e){ show("❌ Lỗi thêm: " + (e.message || e)); }
        });
      });

      document.querySelector("#tbody").addEventListener("click", async (e)=>{
        const btn = e.target.closest("button[data-action]");
        if(!btn) return;
        const id = Number(btn.dataset.id);
        const action = btn.dataset.action;
        
        if(action==="del"){
          showConfirmModal("Xóa phim?", "Hành động này không thể hoàn tác.", async () => {
            try{
              await apiDelete(`/admin/movies/${id}`);
              show("✅ Đã xóa.", "success");
              await refresh();
            }catch(e){ show("❌ Lỗi xóa: " + (e.message || e)); }
          });
        }
        
        if(action==="edit"){
          try{
            const cur = await apiGet(`/admin/movies/${id}`);
            showMovieModal(cur, async (data) => {
              try{
                await apiPut(`/admin/movies/${id}`, data);
                show("✅ Đã cập nhật.", "success");
                await refresh();
              }catch(e){ show("❌ Lỗi cậ p nhật: " + (e.message || e)); }
            });
          }catch(e){ show("❌ Lỗi tải dữ liệu: " + (e.message || e)); }
        }
      });
    }
    main().catch(e=>show(e.message));
  </script>


</body>
</html>
