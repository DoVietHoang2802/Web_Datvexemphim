<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Bảng điều khiển</h4>
      <div class="text-muted small">Doanh thu tính theo payments SUCCESS</div>
    </div>
    <div id="msg"></div>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card p-3">
          <div class="text-muted small">Tổng doanh thu</div>
          <div class="fw-bold fs-3" id="revenue">—</div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card p-3">
          <div class="fw-semibold">Tác vụ nhanh</div>
          <div class="d-flex gap-2 flex-wrap mt-2">
            <a class="btn btn-outline-light btn-sm" href="movies.html">Quản lý phim</a>
            <a class="btn btn-outline-light btn-sm" href="rooms.html">Quản lý phòng/ghế</a>
            <a class="btn btn-outline-light btn-sm" href="showtimes.html">Quản lý lịch chiếu</a>
            <a class="btn btn-outline-light btn-sm" href="food.html">Quản lý thực phẩm</a>
            <a class="btn btn-outline-light btn-sm" href="tickets.html">Xem vé</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet } from "../assets/js/api.js";
    import { formatVnd } from "../assets/js/app.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    async function main(){
      requireAdmin();
      await loadAdminNavbar();
      const stats = await apiGet("/admin/stats/revenue");
      document.querySelector("#revenue").textContent = formatVnd(stats.totalRevenue);
    }
    main().catch(e=>show(e.message));
  </script>
</body>
</html>
