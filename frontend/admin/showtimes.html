<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Showtimes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0">Quản lý lịch chiếu</h4>
      <button class="btn btn-brand btn-sm" id="btnAdd">Thêm suất chiếu</button>
    </div>
    <div id="msg"></div>
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Phim</th>
              <th>Phòng</th>
              <th>Bắt đầu</th>
              <th>Kết thúc</th>
              <th>Giá</th>
              <th class="text-end">Tác vụ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, apiPut, apiDelete } from "../assets/js/api.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";
    import { showShowtimeModal, showConfirmModal } from "./modals.js";
    import { formatTime, formatVnd } from "../assets/js/app.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function row(s){
      return `
        <tr>
          <td>${s.id}</td>
          <td><strong>${s.movieTitle}</strong></td>
          <td><span class="admin-badge admin-badge-warning">${s.roomName}</span></td>
          <td class="small">${formatTime(s.startTime)}</td>
          <td class="small">${formatTime(s.endTime)}</td>
          <td><span class="admin-badge admin-badge-success">${formatVnd(s.price)}</span></td>
          <td class="text-end">
            <button class="btn btn-sm btn-admin btn-outline-light me-1" data-action="edit" data-id="${s.id}">✏️ Sửa</button>
            <button class="btn btn-sm btn-admin btn-outline-warning me-1" data-action="end" data-id="${s.id}">🛑 Kết thúc</button>
            <button class="btn btn-sm btn-admin btn-outline-danger" data-action="del" data-id="${s.id}">🗑️ Xóa</button>
          </td>
        </tr>
      `;
    }

    async function refresh(){
      const list = await apiGet("/admin/showtimes");
      document.querySelector("#tbody").innerHTML = list.map(row).join("") || `<tr><td colspan="7" class="text-muted">Không có dữ liệu</td></tr>`;
    }

    async function main(){
      requireAdmin();
      await loadAdminNavbar();
      
      const movies = await apiGet("/admin/movies");
      const rooms = await apiGet("/admin/rooms");
      
      await refresh();

      document.querySelector("#btnAdd").addEventListener("click", ()=>{
        showShowtimeModal(null, movies, rooms, async (data) => {
          try{
            await apiPost("/admin/showtimes", data);
            show("✅ Đã thêm suất chiếu.", "success");
            await refresh();
          }catch(e){ show("❌ Lỗi thêm: " + (e.message || e)); }
        });
      });

      document.querySelector("#tbody").addEventListener("click", async (e)=>{
        const btn = e.target.closest("button[data-action]");
        if(!btn) return;
        const id = Number(btn.dataset.id);
        const action = btn.dataset.action;
        
        if(action==="del"){
          showConfirmModal("Xóa suất chiếu?", "Hành động này không thể hoàn tác.", async () => {
            try{
              await apiDelete(`/admin/showtimes/${id}`);
              show("✅ Đã xóa.", "success");
              await refresh();
            }catch(e){ show("❌ Lỗi xóa: " + (e.message || e)); }
          });
        }

        if(action==="end"){
          showConfirmModal("Kết thúc suất chiếu?", "Các vé mua sẽ được đánh dấu là hết hạn.", async () => {
            try{
              await apiPost(`/admin/showtimes/${id}/end`);
              show("✅ Đã kết thúc suất chiếu.", "success");
              await refresh();
            }catch(e){ show("❌ Lỗi kết thúc: " + (e.message || e)); }
          });
        }
        
        if(action==="edit"){
          try{
            const cur = await apiGet(`/admin/showtimes/${id}`);
            showShowtimeModal(cur, movies, rooms, async (data) => {
              try{
                await apiPut(`/admin/showtimes/${id}`, data);
                show("✅ Đã cập nhật.", "success");
                await refresh();
              }catch(e){ show("❌ Lỗi cập nhật: " + (e.message || e)); }
            });
          }catch(e){ show("❌ Lỗi tải dữ liệu: " + (e.message || e)); }
        }
      });
    }
    main().catch(e=>show(e.message));
  </script>


</body>
</html>
