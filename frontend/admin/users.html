<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0">Quản lý người dùng</h4>
      <button class="btn btn-outline-light btn-sm" id="btnRefresh">Làm mới</button>
    </div>
    <div id="msg"></div>
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Email</th>
              <th>Tên đầy đủ</th>
              <th>Vài trò</th>
              <th>Trạng thái</th>
              <th>Tọa tạo</th>
              <th class="text-end">Tác vụ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiDelete, apiPost } from "../assets/js/api.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";
    import { showConfirmModal } from "./modals.js";
    import { formatTime } from "../assets/js/app.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }
    function row(u){
      const isLocked = !u.enabled;
      return `
        <tr class="${isLocked ? "table-secondary" : ""}">
          <td>${u.id}</td>
          <td>${u.email}</td>
          <td>${u.fullName}</td>
          <td><span class="badge ${u.role==="ADMIN" ? "text-bg-warning" : "text-bg-secondary"}">${u.role}</span></td>
          <td>
            ${isLocked
              ? '<span class="badge text-bg-danger">Bị khóa</span>'
              : '<span class="badge text-bg-success">Hoạt động</span>'}
          </td>
          <td class="small">${formatTime(u.createdAt)}</td>
          <td class="text-end">
            ${isLocked
              ? `<button class="btn btn-sm btn-admin btn-outline-success me-1" data-action="unlock" data-id="${u.id}">🔓 Mở khóa</button>`
              : `<button class="btn btn-sm btn-admin btn-outline-dark me-1" data-action="lock" data-id="${u.id}" ${u.role==="ADMIN" ? "disabled" : ""}>🔒 Khóa</button>`}
            <button class="btn btn-sm btn-admin btn-outline-info me-1" data-action="change-role" data-id="${u.id}">🔑 Quyền</button>
            <button class="btn btn-sm btn-admin btn-outline-warning me-1" data-action="reset-password" data-id="${u.id}">🔐 Mật khẩu</button>
            <button class="btn btn-sm btn-admin btn-outline-danger" data-action="delete" data-id="${u.id}" ${u.role==="ADMIN" ? "disabled" : ""}>🗑️ Xóa</button>
          </td>
        </tr>
      `;
    }
    async function refresh(){
      const list = await apiGet("/admin/users");
      document.querySelector("#tbody").innerHTML = list.map(row).join("") || `<tr><td colspan="7" class="text-muted">Không có dữ liệu</td></tr>`;
    }
    async function main(){
      requireAdmin();
      await loadAdminNavbar();
      await refresh();
      document.querySelector("#btnRefresh").addEventListener("click", ()=>refresh().catch(e=>show("❌ Lỗi: " + e.message)));
      document.querySelector("#tbody").addEventListener("click", async (e)=>{
        const btn = e.target.closest("button[data-action]");
        if(!btn || btn.disabled) return;
        const id = Number(btn.dataset.id);
        const action = btn.dataset.action;

        if(action === "delete"){
          showConfirmModal("Xóa người dùng?", "Hành động này không thể hoàn tác.", async () => {
            try{
              await apiDelete(`/admin/users/${id}`);
              show("✅ Đã xóa.", "success");
              await refresh();
            }catch(err){ show("❌ Lỗi xóa: " + (err.message || err)); }
          }, "Xóa", "btn-admin-danger");
        }

        if(action === "change-role"){
          const newRole = prompt("Nhập vài trò mới (USER hoặc ADMIN):", "USER");
          if(newRole && (newRole === "USER" || newRole === "ADMIN")){
            try{
              await apiPost(`/admin/users/${id}/change-role?role=${newRole}`);
              show("✅ Đã thay đổi vài trò.", "success");
              await refresh();
            }catch(err){ show("❌ Lỗi thay đổi: " + (err.message || err)); }
          }
        }

        if(action === "reset-password"){
          const newPassword = prompt("Nhập mật khẩu mới (tối thiểu 6 ký tự):");
          if(newPassword && newPassword.length >= 6){
            try{
              await apiPost(`/admin/users/${id}/reset-password?newPassword=${encodeURIComponent(newPassword)}`);
              show("✅ Đã đặt lại mật khẩu.", "success");
              await refresh();
            }catch(err){ show("❌ Lỗi đặt lại: " + (err.message || err)); }
          } else if(newPassword) {
            show("❌ Mật khẩu phải có tối thiểu 6 ký tự.", "danger");
          }
        }

        if(action === "lock"){
          showConfirmModal("Khóa tài khoản?", "Người dùng sẽ không thể đăng nhập cho đến khi được mở khóa.", async () => {
            try{
              await apiPost(`/admin/users/${id}/lock`);
              show("✅ Đã khóa tài khoản.", "success");
              await refresh();
            }catch(err){ show("❌ Lỗi khóa: " + (err.message || err)); }
          }, "Khóa", "btn-admin-danger");
        }

        if(action === "unlock"){
          try{
            await apiPost(`/admin/users/${id}/unlock`);
            show("✅ Đã mở khóa tài khoản.", "success");
            await refresh();
          }catch(err){ show("❌ Lỗi mở khóa: " + (err.message || err)); }
        }
      });
    }
    main().catch(e=>show("❌ Lỗi: " + e.message));
  </script>


</body>
</html>
