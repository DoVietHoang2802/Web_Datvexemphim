<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quản lý voucher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .voucher-card {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .voucher-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    .voucher-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
      color: white;
    }
    .voucher-code {
      font-family: monospace;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .voucher-badge {
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
    }
    .voucher-body {
      padding: 1rem;
    }
    .voucher-stat {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .voucher-stat:last-child {
      border-bottom: none;
    }
    .voucher-stat-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }
    .voucher-stat-value {
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .form-control, .form-select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #667eea;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .form-label {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .modal-content {
      background: #1e1e2f;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-header {
      border-bottom-color: rgba(255,255,255,0.1);
    }
    .modal-footer {
      border-top-color: rgba(255,255,255,0.1);
    }
    .btn-close {
      filter: invert(1);
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="mb-1">🎫 Quản lý voucher</h3>
        <p class="text-muted mb-0 small">Tạo và quản lý mã giảm giá</p>
      </div>
      <button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#voucherModal">
        <i class="fas fa-plus me-2"></i>Tạo voucher mới
      </button>
    </div>

    <div id="msg"></div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="voucher-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background: rgba(102, 126, 234, 0.2); color: #667eea;">
              <i class="fas fa-ticket-alt"></i>
            </div>
            <div>
              <div class="text-muted small">Tổng voucher</div>
              <div class="fs-4 fw-bold text-white" id="totalVouchers">—</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="voucher-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background: rgba(72, 187, 120, 0.2); color: #48bb78;">
              <i class="fas fa-check-circle"></i>
            </div>
            <div>
              <div class="text-muted small">Đang hoạt động</div>
              <div class="fs-4 fw-bold text-white" id="activeVouchers">—</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="voucher-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background: rgba(245, 101, 101, 0.2); color: #f56565;">
              <i class="fas fa-times-circle"></i>
            </div>
            <div>
              <div class="text-muted small">Hết hạn</div>
              <div class="fs-4 fw-bold text-white" id="expiredVouchers">—</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="voucher-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background: rgba(237, 137, 54, 0.2); color: #ed8936;">
              <i class="fas fa-percentage"></i>
            </div>
            <div>
              <div class="text-muted small">Giảm tối đa</div>
              <div class="fs-4 fw-bold text-white" id="maxDiscount">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Voucher List -->
    <div id="voucherList" class="row g-3"></div>
  </main>

  <!-- Modal -->
  <div class="modal fade" id="voucherModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-white" id="voucherModalTitle">Tạo voucher mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="voucherForm">
            <input type="hidden" id="voucherId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Mã voucher *</label>
                <input type="text" class="form-control" id="voucherCode" placeholder="VD: SUMMER2024" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Mô tả</label>
                <input type="text" class="form-control" id="voucherDescription" placeholder="VD: Giảm giá mùa hè">
              </div>
              <div class="col-md-6">
                <label class="form-label">Phần trăm giảm (%) *</label>
                <input type="number" class="form-control" id="voucherDiscount" min="1" max="100" placeholder="VD: 10" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Giảm tối đa (VND) *</label>
                <input type="number" class="form-control" id="voucherMaxDiscount" min="0" placeholder="VD: 50000" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Đơn hàng tối thiểu (VND)</label>
                <input type="number" class="form-control" id="voucherMinOrder" min="0" placeholder="VD: 100000" value="0">
              </div>
              <div class="col-md-6">
                <label class="form-label">Số lần sử dụng tối đa</label>
                <input type="number" class="form-control" id="voucherUsageLimit" min="1" placeholder="VD: 100" value="100">
              </div>
              <div class="col-md-6">
                <label class="form-label">Từ ngày *</label>
                <input type="datetime-local" class="form-control" id="voucherValidFrom" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Đến ngày *</label>
                <input type="datetime-local" class="form-control" id="voucherValidUntil" required>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="voucherActive" checked>
                  <label class="form-check-label text-white" for="voucherActive">
                    Kích hoạt ngay
                  </label>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-brand" id="btnSaveVoucher">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, apiPut, apiDelete } from "../assets/js/api.js";
    import { formatVnd, formatTime } from "../assets/js/app.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";

    let vouchers = [];
    let editingId = null;

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function renderVouchers() {
      const list = document.querySelector("#voucherList");

      if (!vouchers.length) {
        list.innerHTML = `
          <div class="col-12">
            <div class="text-center py-5 text-muted">
              <i class="fas fa-ticket-alt fa-3x mb-3 opacity-50"></i>
              <div>Chưa có voucher nào</div>
            </div>
          </div>
        `;
        return;
      }

      list.innerHTML = vouchers.map(v => {
        const now = new Date();
        const validUntil = new Date(v.validUntil);
        const isExpired = now > validUntil;

        return `
          <div class="col-md-6 col-lg-4">
            <div class="voucher-card">
              <div class="voucher-header d-flex justify-content-between align-items-center">
                <span class="voucher-code">${v.code}</span>
                <span class="badge bg-light text-dark voucher-badge">${v.discountPercent}%</span>
              </div>
              <div class="voucher-body">
                <div class="voucher-stat">
                  <span class="voucher-stat-label">Mô tả</span>
                  <span class="voucher-stat-value">${v.description || '-'}</span>
                </div>
                <div class="voucher-stat">
                  <span class="voucher-stat-label">Giảm tối đa</span>
                  <span class="voucher-stat-value">${formatVnd(v.maxDiscount)}</span>
                </div>
                <div class="voucher-stat">
                  <span class="voucher-stat-label">Đơn tối thiểu</span>
                  <span class="voucher-stat-value">${formatVnd(v.minOrderAmount)}</span>
                </div>
                <div class="voucher-stat">
                  <span class="voucher-stat-label">Đã dùng</span>
                  <span class="voucher-stat-value">${v.usedCount}/${v.usageLimit}</span>
                </div>
                <div class="voucher-stat">
                  <span class="voucher-stat-label">Hết hạn</span>
                  <span class="voucher-stat-value ${isExpired ? 'text-danger' : ''}">${formatTime(v.validUntil)}</span>
                </div>
                <div class="mt-3 d-flex gap-2">
                  <button class="btn btn-sm btn-outline-light flex-fill" onclick="editVoucher(${v.id})">
                    <i class="fas fa-edit"></i> Sửa
                  </button>
                  <button class="btn btn-sm ${v.isActive ? 'btn-outline-warning' : 'btn-outline-success'}" onclick="toggleVoucher(${v.id})">
                    <i class="fas fa-${v.isActive ? 'pause' : 'play'}"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteVoucher(${v.id})">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateStats() {
      const now = new Date();
      const total = vouchers.length;
      const active = vouchers.filter(v => v.isActive && new Date(v.validUntil) > now).length;
      const expired = vouchers.filter(v => new Date(v.validUntil) <= now).length;
      const maxDiscount = vouchers.length ? Math.max(...vouchers.map(v => v.maxDiscount)) : 0;

      document.querySelector("#totalVouchers").textContent = total;
      document.querySelector("#activeVouchers").textContent = active;
      document.querySelector("#expiredVouchers").textContent = expired;
      document.querySelector("#maxDiscount").textContent = formatVnd(maxDiscount);
    }

    function openModal(voucher = null) {
      editingId = voucher ? voucher.id : null;
      document.querySelector("#voucherModalTitle").textContent = voucher ? "Sửa voucher" : "Tạo voucher mới";

      if (voucher) {
        document.querySelector("#voucherCode").value = voucher.code;
        document.querySelector("#voucherDescription").value = voucher.description || "";
        document.querySelector("#voucherDiscount").value = voucher.discountPercent;
        document.querySelector("#voucherMaxDiscount").value = voucher.maxDiscount;
        document.querySelector("#voucherMinOrder").value = voucher.minOrderAmount;
        document.querySelector("#voucherUsageLimit").value = voucher.usageLimit;
        document.querySelector("#voucherActive").checked = voucher.isActive;

        // Format datetime
        const from = new Date(voucher.validFrom);
        const until = new Date(voucher.validUntil);
        document.querySelector("#voucherValidFrom").value = from.toISOString().slice(0, 16);
        document.querySelector("#voucherValidUntil").value = until.toISOString().slice(0, 16);
      } else {
        document.querySelector("#voucherForm").reset();
        document.querySelector("#voucherActive").checked = true;
        document.querySelector("#voucherUsageLimit").value = 100;
        document.querySelector("#voucherMinOrder").value = 0;

        // Set default dates
        const now = new Date();
        const nextMonth = new Date(now);
        nextMonth.setMonth(nextMonth.getMonth() + 1);
        document.querySelector("#voucherValidFrom").value = now.toISOString().slice(0, 16);
        document.querySelector("#voucherValidUntil").value = nextMonth.toISOString().slice(0, 16);
      }

      new bootstrap.Modal(document.querySelector("#voucherModal")).show();
    }

    window.editVoucher = async function(id) {
      const voucher = vouchers.find(v => v.id === id);
      if (voucher) openModal(voucher);
    };

    window.toggleVoucher = async function(id) {
      try {
        await apiPost(`/admin/vouchers/${id}/toggle`, {});
        await loadVouchers();
        show("Cập nhật trạng thái thành công!", "success");
      } catch (e) {
        show(e.message);
      }
    };

    window.deleteVoucher = async function(id) {
      if (!confirm("Xóa voucher này?")) return;
      try {
        await apiDelete(`/admin/vouchers/${id}`);
        await loadVouchers();
        show("Xóa thành công!", "success");
      } catch (e) {
        show(e.message);
      }
    };

    async function loadVouchers() {
      vouchers = await apiGet("/admin/vouchers");
      renderVouchers();
      updateStats();
    }

    document.querySelector("#btnSaveVoucher").addEventListener("click", async () => {
      const data = {
        code: document.querySelector("#voucherCode").value.toUpperCase(),
        description: document.querySelector("#voucherDescription").value,
        discountPercent: parseInt(document.querySelector("#voucherDiscount").value),
        maxDiscount: parseInt(document.querySelector("#voucherMaxDiscount").value),
        minOrderAmount: parseInt(document.querySelector("#voucherMinOrder").value) || 0,
        usageLimit: parseInt(document.querySelector("#voucherUsageLimit").value),
        validFrom: new Date(document.querySelector("#voucherValidFrom").value).toISOString(),
        validUntil: new Date(document.querySelector("#voucherValidUntil").value).toISOString(),
        isActive: document.querySelector("#voucherActive").checked
      };

      try {
        if (editingId) {
          await apiPut(`/admin/vouchers/${editingId}`, data);
          show("Cập nhật thành công!", "success");
        } else {
          await apiPost("/admin/vouchers", data);
          show("Tạo thành công!", "success");
        }
        bootstrap.Modal.getInstance(document.querySelector("#voucherModal")).hide();
        await loadVouchers();
      } catch (e) {
        show(e.message);
      }
    });

    async function main() {
      requireAdmin();
      await loadAdminNavbar();
      await loadVouchers();
    }
    main().catch(e => show(e.message));
  </script>
</body>
</html>
