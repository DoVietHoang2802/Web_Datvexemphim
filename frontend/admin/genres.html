<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Thể loại phim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0">Quản lý thể loại phim</h4>
      <button class="btn btn-brand btn-sm" id="btnAdd">Thêm thể loại</button>
    </div>
    <div id="msg"></div>
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên thể loại</th>
              <th>Mô tả</th>
              <th>Trạng thái</th>
              <th class="text-end">Tác vụ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPost, apiPut, apiDelete } from "../assets/js/api.js";
    import { requireAdmin, loadAdminNavbar } from "./admin.js";
    import { showGenreModal, showConfirmModal } from "./modals.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function row(g){
      return `
        <tr>
          <td>${g.id}</td>
          <td><strong>${g.name}</strong></td>
          <td>${g.description || '-'}</td>
          <td><span class="admin-badge ${g.isActive ? 'admin-badge-success' : 'admin-badge-danger'}">${g.isActive ? "Hoạt động" : "Không hoạt động"}</span></td>
          <td class="text-end">
            <button class="btn btn-sm btn-admin btn-outline-light me-1" data-action="edit" data-id="${g.id}">✏️ Sửa</button>
            <button class="btn btn-sm btn-admin btn-outline-danger" data-action="del" data-id="${g.id}">🗑️ Xóa</button>
          </td>
        </tr>
      `;
    }

    async function refresh(){
      const list = await apiGet("/admin/movies/genres");
      document.querySelector("#tbody").innerHTML = list.map(row).join("") || `<tr><td colspan="5" class="text-muted">Không có dữ liệu</td></tr>`;
    }

    async function main(){
      requireAdmin();
      await loadAdminNavbar();
      await refresh();

      document.querySelector("#btnAdd").addEventListener("click", ()=>{
        showGenreModal(null, async (data) => {
          try{
            await apiPost("/admin/movies/genres", data);
            show("✅ Đã thêm thể loại.", "success");
            await refresh();
          }catch(e){ show("❌ Lỗi thêm: " + (e.message || e)); }
        });
      });

      document.querySelector("#tbody").addEventListener("click", async (e)=>{
        const btn = e.target.closest("button[data-action]");
        if(!btn) return;
        const id = Number(btn.dataset.id);
        const action = btn.dataset.action;

        if(action==="del"){
          showConfirmModal("Xóa thể loại?", "Hành động này không thể hoàn tác.", async () => {
            try{
              await apiDelete(`/admin/movies/genres/${id}`);
              show("✅ Đã xóa.", "success");
              await refresh();
            }catch(e){ show("❌ Lỗi xóa: " + (e.message || e)); }
          });
        }

        if(action==="edit"){
          try{
            const cur = await apiGet(`/admin/movies/genres/${id}`);
            showGenreModal(cur, async (data) => {
              try{
                await apiPut(`/admin/movies/genres/${id}`, data);
                show("✅ Đã cập nhật.", "success");
                await refresh();
              }catch(e){ show("❌ Lỗi cập nhật: " + (e.message || e)); }
            });
          }catch(e){ show("❌ Lỗi tải dữ liệu: " + (e.message || e)); }
        }
      });
    }
    main().catch(e=>show(e.message));
  </script>
</body>
</html>
