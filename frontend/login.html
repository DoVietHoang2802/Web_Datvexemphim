<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-5" style="max-width:520px">
    <div class="card p-4">
      <h4 class="mb-3">Đăng nhập</h4>
      <div class="text-muted small mb-3">Dùng email + mật khẩu để lấy JWT token.</div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="email" class="form-control" placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input id="password" type="password" class="form-control" placeholder="••••••">
      </div>
      <div id="msg"></div>
      <button id="btnLogin" class="btn btn-brand w-100">Đăng nhập</button>
      <div class="text-muted small mt-3">
        Chưa có tài khoản? <a class="link" href="register.html">Đăng ký</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiPost, setAuth } from "./assets/js/api.js";
    import { setupNavbar } from "./assets/js/app.js";
    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }
    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }
    async function main(){
      await loadNavbar();
      document.querySelector("#btnLogin").addEventListener("click", async ()=>{
        try{
          const email = document.querySelector("#email").value.trim();
          const password = document.querySelector("#password").value;
          const auth = await apiPost("/auth/login", { email, password });
          setAuth(auth);
          location.href = "index.html";
        }catch(e){
          show(e.message);
        }
      });
    }
    main();
  </script>
</body>
</html>
