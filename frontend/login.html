<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 24px;
      font-weight: 600;
      font-size: 1rem;
      color: #374151;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .google-btn:hover {
      border-color: #4285f4;
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2);
      transform: translateY(-2px);
    }
    .google-btn img {
      width: 24px;
      height: 24px;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e5e7eb;
    }
    .divider span {
      padding: 0 12px;
      color: #9ca3af;
      font-size: 0.875rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-5" style="max-width:520px">
    <div class="card p-4">
      <h4 class="mb-3">Đăng nhập</h4>

      <!-- Nút đăng nhập Google -->
      <button id="btnGoogleLogin" class="google-btn w-100">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Đăng nhập bằng Google
      </button>

      <div class="divider">
        <span>hoặc</span>
      </div>

      <div class="text-muted small mb-3">Dùng email + mật khẩu để đăng nhập</div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="email" class="form-control" placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input id="password" type="password" class="form-control" placeholder="••••••">
      </div>
      <div id="msg"></div>
      <button id="btnLogin" class="btn btn-brand w-100">Đăng nhập</button>
      <div class="text-center mt-2">
        <a class="link small" href="forgot-password.html">Quên mật khẩu?</a>
      </div>
      <div class="text-muted small mt-3">
        Chưa có tài khoản? <a class="link" href="register.html">Đăng ký</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiPost, setAuth } from "./assets/js/api.js";
    import { setupNavbar } from "./assets/js/app.js";
    import { signInWithGoogle } from "./assets/js/firebase.js";

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    // Xử lý đăng nhập Google
    async function handleGoogleLogin() {
      const btn = document.querySelector("#btnGoogleLogin");
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="loading-spinner"></span> Đang đăng nhập...';
      btn.disabled = true;

      try {
        const result = await signInWithGoogle();

        if (result.success) {
          // Gửi Google token về backend để tạo JWT
          const response = await apiPost("/auth/google-login", {
            idToken: result.idToken,
            email: result.user.email,
            displayName: result.user.displayName,
            photoURL: result.user.photoURL
          });

          setAuth(response);
          location.href = "index.html";
        } else {
          show("Đăng nhập Google thất bại: " + result.error);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      } catch (error) {
        show("Lỗi: " + error.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    async function main(){
      await loadNavbar();

      // Sự kiện đăng nhập Google
      document.querySelector("#btnGoogleLogin").addEventListener("click", handleGoogleLogin);

      // Sự kiện đăng nhập thường
      document.querySelector("#btnLogin").addEventListener("click", async ()=>{
        try{
          const email = document.querySelector("#email").value.trim();
          const password = document.querySelector("#password").value;
          const auth = await apiPost("/auth/login", { email, password });
          setAuth(auth);
          location.href = "index.html";
        }catch(e){
          show(e.message);
        }
      });
    }
    main();
  </script>
</body>
</html>
