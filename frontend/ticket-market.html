<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chợ Pass Vé - DATVEXEMPHIM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f23;
      --card: #1a1a2e;
      --card-2: #141428;
      --border: rgba(255,255,255,.08);
      --text-muted: #9aa0b4;
      --brand-a: #667eea;
      --brand-b: #764ba2;
      --self-msg: linear-gradient(135deg, #667eea, #8b5cf6);
      --other-msg: #2b2f46;
    }

    body {
      background: radial-gradient(circle at top right, rgba(118,75,162,.22), transparent 30%), var(--bg);
      color: #fff;
      min-height: 100vh;
    }

    .page-header {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      padding: 1.25rem 0;
      margin-bottom: 1.25rem;
      border-radius: 0 0 1rem 1rem;
      box-shadow: 0 10px 30px rgba(118,75,162,.25);
    }

    .market-layout {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(480px, 1.7fr);
      gap: 1rem;
      align-items: stretch;
      min-height: calc(100vh - 220px);
    }

    .glass-panel {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(0,0,0,.22);
    }

    /* LEFT: Tickets */
    .tickets-panel {
      padding: 0.9rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tickets-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
      padding-bottom: .75rem;
      border-bottom: 1px dashed var(--border);
    }

    .ticket-list {
      overflow-y: auto;
      padding-right: .35rem;
      display: grid;
      gap: .65rem;
      max-height: calc(100vh - 330px);
    }

    .market-card {
      background: linear-gradient(160deg, #171a2f, #1b1f39);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: .85rem;
      padding: .85rem;
      transition: .2s ease;
      cursor: pointer;
    }

    .market-card:hover {
      transform: translateY(-2px);
      border-color: rgba(102,126,234,.65);
      box-shadow: 0 10px 24px rgba(65,72,130,.2);
    }

    .market-card.active-ticket {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139,92,246,.25) inset;
    }

    .movie-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c3cbff;
      margin-bottom: .4rem;
    }

    .ticket-info { font-size: .84rem; color: var(--text-muted); margin-bottom: .16rem; }
    .ticket-info i { width: 18px; color: #9f8ee9; }
    .price-tag { font-weight: 700; color: #fbbf24; }
    .seller-badge {
      display: inline-block;
      margin-top: .35rem;
      background: rgba(102,126,234,.15);
      border: 1px solid rgba(102,126,234,.35);
      color: #c4ceff;
      border-radius: 999px;
      font-size: .75rem;
      padding: .15rem .5rem;
    }

    .ticket-actions {
      margin-top: .55rem;
      display: flex;
      gap: .45rem;
    }

    .btn-request,
    .btn-chat-ticket {
      border: none;
      border-radius: .5rem;
      font-size: .8rem;
      padding: .35rem .6rem;
      font-weight: 600;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-request { background: #22c55e; color: #fff; }
    .btn-request:hover { background: #16a34a; }

    .btn-chat-ticket {
      background: rgba(102,126,234,.16);
      color: #dbe4ff;
      border: 1px solid rgba(102,126,234,.4);
    }
    .btn-chat-ticket:hover { background: rgba(102,126,234,.28); }

    .btn-pending {
      background: rgba(245,158,11,.18);
      border: 1px solid rgba(245,158,11,.45);
      color: #fcd34d;
      border-radius: .5rem;
      padding: .35rem .6rem;
      font-size: .8rem;
      font-weight: 700;
    }

    /* RIGHT: GLOBAL CHAT */
    .global-chat {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 220px);
      overflow: hidden;
    }

    .global-chat-header {
      padding: .9rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(102,126,234,.22), rgba(118,75,162,.22));
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }

    .global-chat-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .online-chip {
      font-size: .78rem;
      color: #d9e0ff;
      background: rgba(76,221,166,.18);
      border: 1px solid rgba(76,221,166,.45);
      border-radius: 999px;
      padding: .2rem .55rem;
      white-space: nowrap;
    }

    .global-chat-quick {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      padding: .7rem 1rem;
      border-bottom: 1px dashed var(--border);
    }

    .quick-chip {
      border: 1px solid rgba(139,92,246,.45);
      background: rgba(139,92,246,.12);
      color: #ddd7ff;
      border-radius: 999px;
      padding: .2rem .55rem;
      font-size: .75rem;
      cursor: pointer;
      transition: .2s ease;
    }
    .quick-chip:hover { background: rgba(139,92,246,.24); }

    .global-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: .9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .global-msg {
      max-width: 76%;
      border-radius: .75rem;
      padding: .45rem .65rem;
      animation: fadeInUp .2s ease;
      border: 1px solid transparent;
      transition: .2s ease;
    }

    .global-msg:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.15);
    }

    .global-msg.other {
      background: var(--other-msg);
      color: #e5e7eb;
      align-self: flex-start;
      border-bottom-left-radius: .25rem;
    }

    .global-msg.me {
      background: var(--self-msg);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: .25rem;
    }

    .msg-user {
      font-size: .72rem;
      color: #9aa0b4;
      margin-bottom: .1rem;
      font-weight: 700;
    }

    .msg-content {
      font-size: .9rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-time {
      margin-top: .16rem;
      text-align: right;
      font-size: .66rem;
      color: rgba(255,255,255,.6);
    }

    .system-msg {
      align-self: center;
      background: rgba(245,158,11,.15);
      color: #fcd34d;
      border: 1px dashed rgba(245,158,11,.45);
      border-radius: 999px;
      font-size: .72rem;
      padding: .2rem .65rem;
      margin: .35rem 0;
    }

    .global-chat-input {
      border-top: 1px solid var(--border);
      padding: .8rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .55rem;
      background: rgba(255,255,255,.02);
    }

    .global-chat-input input {
      width: 100%;
      border-radius: .65rem;
      border: 1px solid rgba(255,255,255,.12);
      background: #14172a;
      color: #fff;
      padding: .62rem .8rem;
      font-size: .92rem;
      outline: none;
    }

    .global-chat-input input:focus {
      border-color: rgba(102,126,234,.85);
      box-shadow: 0 0 0 3px rgba(102,126,234,.18);
    }

    .btn-send {
      border: none;
      border-radius: .65rem;
      min-width: 52px;
      padding: 0 .9rem;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: #fff;
      font-weight: 700;
      transition: .2s ease;
    }
    .btn-send:hover { transform: translateY(-1px); opacity: .95; }

    .empty-chat {
      text-align: center;
      color: var(--text-muted);
      margin: auto 0;
      padding: 2rem 1rem;
    }

    .toast-box {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      display: grid;
      gap: .5rem;
    }

    .toast-msg {
      border-radius: .5rem;
      padding: .65rem .9rem;
      font-size: .86rem;
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      color: #fff;
      animation: fadeInUp .18s ease;
    }
    .toast-msg.success { background: #22c55e; }
    .toast-msg.error { background: #ef4444; }
    .toast-msg.info { background: #667eea; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 992px) {
      .market-layout {
        grid-template-columns: 1fr;
      }
      .global-chat,
      .ticket-list {
        max-height: 420px;
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <div id="navbarContainer"></div>

  <div class="page-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h2 class="mb-1"><i class="fas fa-tags me-2"></i>Chợ Pass Vé</h2>
          <p class="mb-0 text-white-50">Mua bán & trao đổi vé xem phim an toàn</p>
        </div>
        <span class="badge bg-light text-dark fs-6" id="ticketCount">0 vé</span>
      </div>
    </div>
  </div>

  <div class="container mb-4">
    <div id="loginPrompt" class="glass-panel p-4 text-center" style="display:none;">
      <i class="fas fa-lock mb-2" style="font-size:2.2rem;color:#8ea0ff;"></i>
      <h5>Vui lòng đăng nhập</h5>
      <p class="text-secondary mb-3">Bạn cần đăng nhập để chat và nhận vé.</p>
      <a href="login.html" class="btn btn-primary">Đăng nhập ngay</a>
    </div>

    <div id="marketLayout" class="market-layout" style="display:none;">
      <!-- LEFT: Ticket List -->
      <section class="glass-panel tickets-panel">
        <div class="tickets-panel-header">
          <h6 class="m-0"><i class="fas fa-ticket-alt me-2"></i>Danh sách vé đang pass</h6>
          <small class="text-secondary" id="ticketHint">Click vé để gợi ý chat</small>
        </div>
        <div id="ticketGrid" class="ticket-list"></div>
      </section>

      <!-- RIGHT: Global Chat -->
      <section class="glass-panel global-chat">
        <div class="global-chat-header">
          <h6 class="global-chat-title">💬 Chat Pass Vé</h6>
          <div class="d-flex align-items-center gap-2">
            <span class="online-chip"><i class="fas fa-circle me-1" style="font-size:.55rem;color:#22c55e"></i><span id="onlineCount">0</span> online</span>
          </div>
        </div>

        <div class="global-chat-quick">
          <button class="quick-chip" onclick="quickMessage('Ai pass vé không?')">Ai pass vé không?</button>
          <button class="quick-chip" onclick="quickMessage('Cần vé tối nay')">Cần vé tối nay</button>
          <button class="quick-chip" onclick="quickMessage('Cho mình xin review suất này với!')">Xin review suất này</button>
        </div>

        <div id="communityMsgs" class="global-chat-messages">
          <div class="empty-chat">
            <i class="fas fa-comments mb-2" style="font-size:1.3rem;"></i>
            <div>Chưa có tin nhắn nào. Hãy mở lời đầu tiên 👋</div>
          </div>
        </div>

        <div class="global-chat-input">
          <input id="communityInput" type="text" placeholder="Nhắn cộng đồng về pass vé..." onkeydown="if(event.key==='Enter') sendCommunity()">
          <button class="btn-send" onclick="sendCommunity()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </section>
    </div>
  </div>

  <div id="toastBox" class="toast-box"></div>

  <script src="/assets/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { apiGet, apiPost, getToken } from './assets/js/api.js';

    let currentUserId = null;
    let myRequestedTicketIds = new Set();
    let pendingRequests = [];
    let eventSource = null;
    let isAutoScrollEnabled = true;
    let loadedCommunity = false;

    const mockMessages = [
      { id: -1, senderId: 1, senderFullName: 'huy', content: 'Mình đang pass vé Zombie 20:00 ghế A1', createdAt: new Date().toISOString() },
      { id: -2, senderId: 2, senderFullName: 'thảo', content: 'Ai cần vé tối nay ib mình nha!', createdAt: new Date().toISOString() }
    ];

    async function init() {
      await loadNavbar();
      updateAuthUI();

      if (!getToken()) return;

      await Promise.all([
        loadTickets(),
        loadMyRequests(),
        loadCommunityMessages()
      ]);

      connectCommunityStream();
    }

    async function loadNavbar() {
      const res = await fetch('./partials/navbar.html');
      const html = await res.text();
      document.getElementById('navbarContainer').innerHTML = html;
    }

    function updateAuthUI() {
      const token = getToken();
      const authArea = document.getElementById('authArea');
      const loginPrompt = document.getElementById('loginPrompt');
      const marketLayout = document.getElementById('marketLayout');

      if (!token) {
        if (authArea) authArea.innerHTML = `
          <a href="login.html" class="btn btn-outline-light btn-sm">Đăng nhập</a>
          <a href="register.html" class="btn btn-warning btn-sm">Đăng ký</a>`;
        if (loginPrompt) loginPrompt.style.display = 'block';
        if (marketLayout) marketLayout.style.display = 'none';
        return;
      }

      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        currentUserId = payload.id;
      } catch (e) {
        currentUserId = null;
      }

      const email = localStorage.getItem('userEmail') || '';
      const fullName = localStorage.getItem('userFullName') || email;
      if (authArea) authArea.innerHTML = `
        <span class="text-white-50 small">Xin chào, <strong class="text-white">${escHtml(fullName)}</strong></span>
        <a href="tickets.html" class="btn btn-outline-light btn-sm">Vé của tôi</a>
        <button class="btn btn-danger btn-sm" onclick="logoutNow()">Đăng xuất</button>`;

      if (loginPrompt) loginPrompt.style.display = 'none';
      if (marketLayout) marketLayout.style.display = 'grid';
    }

    function logoutNow() {
      localStorage.clear();
      location.href = 'login.html';
    }

    async function loadMyRequests() {
      try {
        const myReqs = await apiGet('/market/my-requests');
        myRequestedTicketIds = new Set(myReqs.map(r => r.ticketId));
        pendingRequests = myReqs.filter(r => r.status === 'PENDING');
      } catch (e) {
        // ignore
      }
    }

    async function loadTickets() {
      try {
        const tickets = await apiGet('/market/tickets');
        renderTickets(tickets);
      } catch (e) {
        showToast('Không tải được danh sách vé', 'error');
      }
    }

    function renderTickets(tickets) {
      const grid = document.getElementById('ticketGrid');
      const countBadge = document.getElementById('ticketCount');
      countBadge.textContent = `${tickets.length} vé`;

      if (!tickets.length) {
        grid.innerHTML = `<div class="text-center text-secondary py-4"><i class="fas fa-ticket-alt mb-2" style="font-size:1.6rem;"></i><div>Chưa có vé nào được rao bán</div></div>`;
        return;
      }

      grid.innerHTML = tickets.map(t => {
        const isMyTicket = t.sellerId === currentUserId;
        const hasRequested = myRequestedTicketIds.has(t.ticketId);
        const pendingReq = pendingRequests.find(r => r.ticketId === t.ticketId);

        return `
          <article class="market-card" data-ticket-id="${t.ticketId}" onclick="prefillFromTicket(${t.ticketId}, '${escHtml(t.movieTitle)}', '${escHtml(t.seatCode)}', '${escHtml(t.roomName)}', '${escHtml(t.sellerFullName)}')">
            <div class="movie-title"><i class="fas fa-film me-1"></i>${escHtml(t.movieTitle)}</div>
            <div class="ticket-info"><i class="fas fa-clock"></i>${formatDate(t.showtimeStart)}</div>
            <div class="ticket-info"><i class="fas fa-door-open"></i>Phòng ${escHtml(t.roomName)}</div>
            <div class="ticket-info"><i class="fas fa-chair"></i>Ghế ${escHtml(t.seatCode)}</div>
            <div class="ticket-info"><i class="fas fa-tag"></i><span class="price-tag">${formatPrice(t.price)}</span></div>
            <span class="seller-badge"><i class="fas fa-user me-1"></i>${escHtml(t.sellerFullName)}</span>

            <div class="ticket-actions" onclick="event.stopPropagation()">
              ${isMyTicket
                ? `<span class="btn-pending"><i class="fas fa-store me-1"></i>Vé của bạn</span>`
                : (hasRequested || pendingReq)
                    ? `<span class="btn-pending"><i class="fas fa-clock me-1"></i>Đã gửi</span>`
                    : `<button class="btn-request" onclick="requestTicket(${t.ticketId}, this)"><i class="fas fa-hand-holding-heart me-1"></i>Nhận vé</button>`
              }
              <button class="btn-chat-ticket" onclick="prefillFromTicket(${t.ticketId}, '${escHtml(t.movieTitle)}', '${escHtml(t.seatCode)}', '${escHtml(t.roomName)}', '${escHtml(t.sellerFullName)}', true)"><i class="fas fa-comment-dots me-1"></i>Chat</button>
            </div>
          </article>
        `;
      }).join('');
    }

    async function requestTicket(ticketId, btn) {
      if (!getToken()) return showToast('Vui lòng đăng nhập', 'error');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Đang gửi';
      }

      try {
        await apiPost('/market/request', { ticketId });
        showToast('Đã gửi yêu cầu nhận vé', 'success');
        await loadMyRequests();
        await loadTickets();
      } catch (e) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-hand-holding-heart me-1"></i>Nhận vé';
        }
        showToast(e.message || 'Gửi yêu cầu thất bại', 'error');
      }
    }

    function quickMessage(text) {
      const input = document.getElementById('communityInput');
      input.value = text;
      input.focus();
    }

    function prefillFromTicket(ticketId, movieTitle, seatCode, roomName, sellerName, focus = false) {
      const input = document.getElementById('communityInput');
      input.value = `Mình quan tâm vé "${movieTitle}" - ${roomName} ghế ${seatCode}. Bạn ${sellerName} còn vé không ạ?`;

      document.querySelectorAll('.market-card').forEach(el => el.classList.remove('active-ticket'));
      const active = document.querySelector(`[data-ticket-id="${ticketId}"]`);
      if (active) active.classList.add('active-ticket');

      if (focus) input.focus();
    }

    async function loadCommunityMessages() {
      try {
        const messages = await apiGet('/community/messages');
        renderCommunityMessages(messages);
        loadedCommunity = true;
      } catch (e) {
        // fallback demo để chạy độc lập
        renderCommunityMessages(mockMessages);
        loadedCommunity = true;
      }
    }

    function connectCommunityStream() {
      const API_BASE = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE)
        ? CONFIG.API_BASE
        : 'http://localhost:9090/api';

      try {
        if (eventSource) eventSource.close();
        eventSource = new EventSource(`${API_BASE}/community/stream`);

        eventSource.addEventListener('online', (event) => {
          const online = Number(event.data || 0);
          document.getElementById('onlineCount').textContent = Number.isFinite(online) ? online : 0;
        });

        eventSource.addEventListener('message', (event) => {
          const msg = JSON.parse(event.data);
          appendOneCommunityMessage(msg, true);
        });

        eventSource.onerror = () => {
          // auto reconnect handled by EventSource itself
        };
      } catch (e) {
        console.error('SSE unavailable:', e);
      }
    }

    function renderCommunityMessages(messages) {
      const box = document.getElementById('communityMsgs');
      if (!messages || !messages.length) {
        box.innerHTML = `<div class="empty-chat"><i class="fas fa-comments mb-2" style="font-size:1.3rem;"></i><div>Chưa có tin nhắn nào. Hãy mở lời đầu tiên 👋</div></div>`;
        return;
      }

      box.innerHTML = messages.map(renderMsgHtml).join('');
      scrollToBottom(box);
      attachScrollIntent(box);
    }

    function appendOneCommunityMessage(msg, isRealtime = false) {
      const box = document.getElementById('communityMsgs');
      const empty = box.querySelector('.empty-chat');
      if (empty) empty.remove();

      const wrapper = document.createElement('div');
      wrapper.innerHTML = renderMsgHtml(msg);
      box.appendChild(wrapper.firstElementChild);

      if (isRealtime && isAutoScrollEnabled) {
        scrollToBottom(box);
      }
    }

    function renderMsgHtml(m) {
      const isMe = m.senderId === currentUserId;
      return `
        <div class="global-msg ${isMe ? 'me' : 'other'}">
          ${!isMe ? `<div class="msg-user">${escHtml(m.senderFullName || 'User')}</div>` : ''}
          <div class="msg-content">${escHtml(m.content || '')}</div>
          <div class="msg-time">${formatTime(m.createdAt)}</div>
        </div>
      `;
    }

    function attachScrollIntent(box) {
      box.removeEventListener('scroll', handleScrollIntent);
      box.addEventListener('scroll', handleScrollIntent);
    }

    function handleScrollIntent(event) {
      const box = event.target;
      const nearBottom = (box.scrollHeight - box.scrollTop - box.clientHeight) < 60;
      isAutoScrollEnabled = nearBottom;
    }

    function scrollToBottom(box) {
      box.scrollTop = box.scrollHeight;
      isAutoScrollEnabled = true;
    }

    async function sendCommunity() {
      if (!getToken()) return showToast('Vui lòng đăng nhập để gửi tin nhắn', 'error');

      const input = document.getElementById('communityInput');
      const content = input.value.trim();
      if (!content) return;

      input.value = '';

      try {
        await apiPost('/community/messages', { content });
        // SSE sẽ đẩy realtime về tất cả client (bao gồm chính mình)
      } catch (e) {
        input.value = content;
        showToast(e.message || 'Gửi tin nhắn thất bại', 'error');
      }
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('vi-VN', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function formatTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    function formatPrice(p) {
      return `${Number(p || 0).toLocaleString('vi-VN')}đ`;
    }

    function escHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(msg, type = 'info') {
      const box = document.getElementById('toastBox');
      const t = document.createElement('div');
      t.className = `toast-msg ${type}`;
      t.textContent = msg;
      box.appendChild(t);
      setTimeout(() => t.remove(), 2600);
    }

    window.sendCommunity = sendCommunity;
    window.requestTicket = requestTicket;
    window.prefillFromTicket = prefillFromTicket;
    window.quickMessage = quickMessage;
    window.logoutNow = logoutNow;

    init();
  </script>
</body>
</html>
