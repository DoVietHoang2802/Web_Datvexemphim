<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vé của tôi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .page-header {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-tabs .btn {
      border-radius: 20px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    .filter-tabs .btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .ticket-card {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }
    .ticket-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      border-color: rgba(102, 126, 234, 0.3);
    }
    .ticket-card.status-confirmed {
      border-left: 4px solid #10b981;
    }
    .ticket-card.status-pending {
      border-left: 4px solid #f59e0b;
    }
    .ticket-card.status-cancelled {
      border-left: 4px solid #ef4444;
      opacity: 0.7;
    }
    .ticket-header {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
    }
    .ticket-header:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .ticket-movie {
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 0.25rem;
    }
    .ticket-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .ticket-meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .ticket-meta-item i {
      width: 16px;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
    }
    .ticket-price {
      text-align: right;
    }
    .ticket-total {
      font-weight: 700;
      font-size: 1.1rem;
      color: #10b981;
    }
    .ticket-seat-badge {
      background: rgba(102, 126, 234, 0.2);
      color: #a5b4fc;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-badge {
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.confirmed {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .status-badge.pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .status-badge.cancelled {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .status-badge.available {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .status-badge.sold {
      background: rgba(102, 126, 234, 0.2);
      color: #a5b4fc;
      border: 1px solid rgba(102, 126, 234, 0.3);
    }
    .ticket-card.status-available { border-left: 4px solid #f59e0b; }
    .ticket-card.status-sold { border-left: 4px solid #667eea; opacity: 0.75; }
    .ticket-details {
      padding: 0 1.25rem 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: none;
    }
    .ticket-details.open {
      display: block;
      padding-top: 1rem;
    }
    .ticket-details-toggle {
      float: right;
      color: rgba(255, 255, 255, 0.4);
      transition: transform 0.3s;
      font-size: 0.8rem;
      padding: 0.5rem;
      cursor: pointer;
    }
    .ticket-details-toggle.open {
      transform: rotate(180deg);
    }
    .food-order-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .food-order-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .food-item {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }
    .food-item:last-child {
      border-bottom: none;
    }
    .ticket-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty-state h5 {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 0.5rem;
    }
    .loading-skeleton {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .skeleton-line {
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }

    /* QR Modal */
    .qr-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .qr-modal-overlay.show { display: flex; }
    .qr-modal {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
      position: relative;
    }
    .qr-modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      opacity: 0.6;
    }
    .qr-modal-close:hover { opacity: 1; }
    .qr-code-box {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin: 1rem 0;
    }
    .qr-code-box canvas { display: block; }
    .ticket-code-display {
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #667eea;
      letter-spacing: 2px;
      background: rgba(102,126,234,0.1);
      border: 1px dashed rgba(102,126,234,0.4);
      border-radius: 8px;
      padding: 8px 16px;
      display: inline-block;
    }
    .qr-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: #fff;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .qr-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <!-- Page Header -->
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h3 class="mb-1 text-white">
            <i class="fas fa-ticket-alt me-2" style="color: #667eea;"></i>
            Vé của tôi
          </h3>
          <p class="text-muted mb-0 small">Xem và quản lý vé đã đặt</p>
        </div>
        <a class="btn btn-brand btn-sm" href="showtimes.html">
          <i class="fas fa-plus me-1"></i> Đặt thêm vé
        </a>
        <a class="btn btn-outline-warning btn-sm" href="ticket-market.html">
          <i class="fas fa-store me-1"></i> Chợ Pass Vé
        </a>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs mb-3">
      <button class="btn btn-outline-light active" data-filter="all">
        <i class="fas fa-list me-1"></i> Tất cả
      </button>
      <button class="btn btn-outline-light" data-filter="CONFIRMED">
        <i class="fas fa-check-circle me-1"></i> Đã đặt
      </button>
      <button class="btn btn-outline-light" data-filter="AVAILABLE">
        <i class="fas fa-store me-1"></i> Đang bán
      </button>
      <button class="btn btn-outline-light" data-filter="SOLD">
        <i class="fas fa-handshake me-1"></i> Đã bán
      </button>
      <button class="btn btn-outline-light" data-filter="PENDING">
        <i class="fas fa-clock me-1"></i> Chờ TT
      </button>
      <button class="btn btn-outline-light" data-filter="CANCELLED">
        <i class="fas fa-times-circle me-1"></i> Đã hủy
      </button>
    </div>

    <div id="msg"></div>
    <div id="ticketsList">
      <!-- Loading Skeleton -->
      <div class="loading-skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="loading-skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line medium"></div>
      </div>
    </div>
  </main>

  <!-- QR Modal -->
  <div class="qr-modal-overlay" id="qrModal">
    <div class="qr-modal">
      <button class="qr-modal-close" onclick="closeQrModal()">&times;</button>
      <h5 style="color:#fff; margin-bottom:4px;">Mã QR Vé</h5>
      <div class="small text-muted mb-2" id="qrTicketTitle"></div>
      <div class="qr-code-box">
        <div id="qrCanvas" style="display:inline-block;"></div>
      </div>
      <div id="qrTicketCode" class="ticket-code-display"></div>
      <div class="small text-muted mt-2" id="qrTicketSeat"></div>
      <div class="small text-muted" id="qrTicketTime"></div>
      <div class="mt-3 small text-white-50">Đưa mã QR này cho nhân viên quét khi vào rạp</div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./assets/js/tickets.js"></script>
</body>
</html>
