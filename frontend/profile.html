<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hồ sơ cá nhân</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .profile-card {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      text-align: center;
    }
    .avatar-container {
      position: relative;
      display: inline-block;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      background: rgba(255,255,255,0.2);
    }
    .avatar-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
    }
    .profile-name {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 1rem;
    }
    .profile-email {
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
    }
    .form-label {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #667eea;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .form-control:disabled {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255,255,255,0.5);
    }
    .section-title {
      color: #fff;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-pills .nav-link {
      color: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
    }
    .nav-pills .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .nav-pills .nav-link:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div id="msg"></div>

    <div class="row g-4">
      <!-- Profile Card -->
      <div class="col-lg-4">
        <div class="profile-card">
          <div class="profile-header">
            <div class="avatar-container">
              <div class="avatar-placeholder" id="avatarPlaceholder">
                <i class="fas fa-user"></i>
              </div>
              <img class="avatar" id="avatarImg" style="display: none;" src="" alt="Avatar">
            </div>
            <div class="profile-name" id="profileName">—</div>
            <div class="profile-email" id="profileEmail">—</div>
          </div>
          <div class="card-body p-4">
            <div class="text-center">
              <span class="badge bg-light text-dark">
                <i class="fas fa-user-tag"></i> Người dùng
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="col-lg-8">
        <div class="profile-card">
          <div class="card-body p-4">
            <ul class="nav nav-pills mb-4" id="profileTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profileContent" type="button">
                  <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="password-tab" data-bs-toggle="pill" data-bs-target="#passwordContent" type="button">
                  <i class="fas fa-lock me-2"></i>Đổi mật khẩu
                </button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- Profile Tab -->
              <div class="tab-pane fade show active" id="profileContent">
                <form id="profileForm">
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
                    <input type="email" class="form-control" id="email" disabled>
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>Họ và tên</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Nhập họ và tên">
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-phone me-2"></i>Số điện thoại</label>
                    <input type="tel" class="form-control" id="phone" placeholder="Nhập số điện thoại">
                  </div>
                  <div class="mb-4">
                    <label class="form-label"><i class="fas fa-image me-2"></i>URL Avatar</label>
                    <input type="url" class="form-control" id="avatarUrl" placeholder="https://example.com/avatar.jpg">
                  </div>
                  <button type="submit" class="btn btn-brand">
                    <i class="fas fa-save me-2"></i>Lưu thay đổi
                  </button>
                </form>
              </div>

              <!-- Password Tab -->
              <div class="tab-pane fade" id="passwordContent">
                <form id="passwordForm">
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock me-2"></i>Mật khẩu hiện tại</label>
                    <input type="password" class="form-control" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-key me-2"></i>Mật khẩu mới</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)" required>
                  </div>
                  <div class="mb-4">
                    <label class="form-label"><i class="fas fa-key me-2"></i>Xác nhận mật khẩu mới</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                  </div>
                  <button type="submit" class="btn btn-brand">
                    <i class="fas fa-save me-2"></i>Đổi mật khẩu
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPut, apiPost, logout } from "./assets/js/api.js";
    import { setupNavbar } from "./assets/js/app.js";

    function show(msg, type="danger"){
      document.querySelector("#msg").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    async function loadProfile() {
      try {
        const profile = await apiGet("/user/profile");

        document.querySelector("#email").value = profile.email || "";
        document.querySelector("#fullName").value = profile.fullName || "";
        document.querySelector("#phone").value = profile.phone || "";
        document.querySelector("#avatarUrl").value = profile.avatarUrl || "";

        document.querySelector("#profileName").textContent = profile.fullName || "Người dùng";
        document.querySelector("#profileEmail").textContent = profile.email || "";

        if (profile.avatarUrl) {
          document.querySelector("#avatarImg").src = profile.avatarUrl;
          document.querySelector("#avatarImg").style.display = "block";
          document.querySelector("#avatarPlaceholder").style.display = "none";
        } else {
          document.querySelector("#avatarImg").style.display = "none";
          document.querySelector("#avatarPlaceholder").style.display = "flex";
        }
      } catch (e) {
        show("Không thể tải thông tin hồ sơ: " + e.message);
      }
    }

    document.querySelector("#profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        fullName: document.querySelector("#fullName").value,
        phone: document.querySelector("#phone").value,
        avatarUrl: document.querySelector("#avatarUrl").value
      };

      try {
        await apiPut("/user/profile", data);
        show("Cập nhật hồ sơ thành công!", "success");
        loadProfile();
      } catch (e) {
        show(e.message);
      }
    });

    document.querySelector("#passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        currentPassword: document.querySelector("#currentPassword").value,
        newPassword: document.querySelector("#newPassword").value,
        confirmPassword: document.querySelector("#confirmPassword").value
      };

      if (data.newPassword !== data.confirmPassword) {
        show("Mật khẩu mới không khớp!");
        return;
      }

      if (data.newPassword.length < 6) {
        show("Mật khẩu mới phải có ít nhất 6 ký tự!");
        return;
      }

      try {
        await apiPost("/user/change-password", data);
        show("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", "success");
        document.querySelector("#passwordForm").reset();
        setTimeout(() => {
          logout();
        }, 2000);
      } catch (e) {
        show(e.message);
      }
    });

    // Preview avatar
    document.querySelector("#avatarUrl").addEventListener("input", (e) => {
      const url = e.target.value;
      if (url) {
        document.querySelector("#avatarImg").src = url;
        document.querySelector("#avatarImg").style.display = "block";
        document.querySelector("#avatarPlaceholder").style.display = "none";
      } else {
        document.querySelector("#avatarImg").style.display = "none";
        document.querySelector("#avatarPlaceholder").style.display = "flex";
      }
    });

    async function main() {
      await loadProfile();
    }
    main().catch(e => show(e.message));
  </script>
</body>
</html>
