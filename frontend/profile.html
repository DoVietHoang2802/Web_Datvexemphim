<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hồ sơ cá nhân</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .profile-card {
      background: linear-gradient(145deg, #1e1e2f 0%, #252538 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      text-align: center;
    }
    .avatar-container {
      position: relative;
      display: inline-block;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      background: rgba(255,255,255,0.2);
    }
    .avatar-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
    }
    .profile-name {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 1rem;
    }
    .profile-email {
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
    }
    .form-label {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #667eea;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .form-control:disabled {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255,255,255,0.5);
    }
    .section-title {
      color: #fff;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-pills .nav-link {
      color: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
    }
    .nav-pills .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .nav-pills .nav-link:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <!-- Back Button -->
    <div class="mb-3">
      <a class="btn btn-outline-light btn-sm" href="index.html">
        <i class="fas fa-arrow-left me-1"></i> Quay về
      </a>
    </div>

    <div class="row g-4">
      <!-- Profile Card -->
      <div class="col-lg-4">
        <div class="profile-card">
          <div class="profile-header">
            <div class="avatar-container">
              <div class="avatar-placeholder" id="avatarPlaceholder">
                <i class="fas fa-user"></i>
              </div>
              <img class="avatar" id="avatarImg" style="display: none;" src="" alt="Avatar">
            </div>
            <div class="profile-name" id="profileName">—</div>
            <div class="profile-email" id="profileEmail">—</div>
          </div>
          <div class="card-body p-4">
            <div class="text-center">
              <span class="badge bg-light text-dark">
                <i class="fas fa-user-tag"></i> Người dùng
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="col-lg-8">
        <div class="profile-card">
          <div class="card-body p-4">
            <ul class="nav nav-pills mb-4" id="profileTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profileContent" type="button">
                  <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="password-tab" data-bs-toggle="pill" data-bs-target="#passwordContent" type="button">
                  <i class="fas fa-lock me-2"></i>Đổi mật khẩu
                </button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- Profile Tab -->
              <div class="tab-pane fade show active" id="profileContent">
                <form id="profileForm">
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
                    <input type="email" class="form-control" id="email" disabled>
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>Họ và tên</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Nhập họ và tên">
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-phone me-2"></i>Số điện thoại</label>
                    <input type="tel" class="form-control" id="phone" placeholder="Nhập số điện thoại">
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-image me-2"></i>Ảnh đại diện</label>
                    <div class="d-flex gap-3 mb-2">
                      <div class="form-check">
                        <input class="form-check-input" type="radio" name="avatarType" id="avatarTypeUrl" value="url" checked>
                        <label class="form-check-label" for="avatarTypeUrl">Dán URL</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input" type="radio" name="avatarType" id="avatarTypeFile" value="file">
                        <label class="form-check-label" for="avatarTypeFile">Tải lên từ máy</label>
                      </div>
                    </div>
                    <div id="avatarUrlSection">
                      <input type="url" class="form-control" id="avatarUrlInput" placeholder="Dán URL ảnh (VD: https://...jpg)">
                    </div>
                    <div id="avatarFileSection" style="display:none;">
                      <input type="file" class="form-control" id="avatarFileInput" accept="image/*">
                    </div>
                    <div id="avatarPreview" class="mt-2 text-center" style="display:none;">
                      <img id="avatarPreviewImg" src="" style="max-height:100px;max-width:100%;border-radius:8px;">
                    </div>
                  </div>
                  <button type="submit" class="btn btn-brand">
                    <i class="fas fa-save me-2"></i>Lưu thay đổi
                  </button>
                </form>
              </div>

              <!-- Password Tab -->
              <div class="tab-pane fade" id="passwordContent">
                <form id="passwordForm">
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock me-2"></i>Mật khẩu hiện tại</label>
                    <input type="password" class="form-control" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-key me-2"></i>Mật khẩu mới</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)" required>
                  </div>
                  <div class="mb-4">
                    <label class="form-label"><i class="fas fa-key me-2"></i>Xác nhận mật khẩu mới</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                  </div>
                  <button type="submit" class="btn btn-brand">
                    <i class="fas fa-save me-2"></i>Đổi mật khẩu
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module">
    import { apiGet, apiPut, apiPost, apiUpload, logout } from "./assets/js/api.js";
    import { setupNavbar, requireAuth, showToast } from "./assets/js/app.js";

    async function loadNavbar(){
      const html = await fetch("./partials/navbar.html").then(r=>r.text());
      document.querySelector("#navbar").innerHTML = html;
      setupNavbar();
    }

    async function loadProfile() {
      try {
        const profile = await apiGet("/user/profile");

        document.querySelector("#email").value = profile.email || "";
        document.querySelector("#fullName").value = profile.fullName || "";
        document.querySelector("#phone").value = profile.phone || "";
        document.querySelector("#avatarUrlInput").value = profile.avatarUrl || "";

        document.querySelector("#profileName").textContent = profile.fullName || "Người dùng";
        document.querySelector("#profileEmail").textContent = profile.email || "";

        if (profile.avatarUrl) {
          document.querySelector("#avatarImg").src = profile.avatarUrl;
          document.querySelector("#avatarImg").style.display = "block";
          document.querySelector("#avatarPlaceholder").style.display = "none";
        } else {
          document.querySelector("#avatarImg").style.display = "none";
          document.querySelector("#avatarPlaceholder").style.display = "flex";
        }
      } catch (e) {
        showToast("Không thể tải thông tin hồ sơ: " + e.message, 'error');
      }
    }

    document.querySelector("#profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang lưu...';

      try {
        const avatarTypeRadio = document.querySelector('input[name="avatarType"]:checked');
        const avatarType = avatarTypeRadio ? avatarTypeRadio.value : 'url';
        let avatarUrl = '';

        if (avatarType === 'file') {
          const fileInput = document.querySelector("#avatarFileInput");
          if (!fileInput.files[0]) {
            showToast("Vui lòng chọn 1 hình ảnh từ máy!", 'warning');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Lưu thay đổi';
            return;
          }
          try {
            avatarUrl = await apiUpload("/upload/image", fileInput.files[0]);
          } catch (uploadError) {
            showToast("Upload ảnh thất bại: " + uploadError.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Lưu thay đổi';
            return;
          }
        } else {
          avatarUrl = document.querySelector("#avatarUrlInput").value.trim();
        }

        const data = {
          fullName: document.querySelector("#fullName").value,
          phone: document.querySelector("#phone").value,
          avatarUrl: avatarUrl
        };

        await apiPut("/user/profile", data);
        showToast("Cập nhật hồ sơ thành công!", 'success');
        loadProfile();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-2"></i>Lưu thay đổi';
      }
    });

    document.querySelector("#passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        currentPassword: document.querySelector("#currentPassword").value,
        newPassword: document.querySelector("#newPassword").value,
        confirmPassword: document.querySelector("#confirmPassword").value
      };

      if (data.newPassword !== data.confirmPassword) {
        showToast("Mật khẩu mới không khớp!", 'warning');
        return;
      }

      if (data.newPassword.length < 6) {
        showToast("Mật khẩu mới phải có ít nhất 6 ký tự!", 'warning');
        return;
      }

      try {
        const response = await apiPost("/user/change-password", data);
        showToast("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", 'success');
        document.querySelector("#passwordForm").reset();
        setTimeout(() => {
          logout();
        }, 2000);
      } catch (e) {
        showToast(e.message, 'error');
      }
    });

    // Toggle between URL and File input
    document.querySelectorAll('input[name="avatarType"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const urlSection = document.querySelector("#avatarUrlSection");
        const fileSection = document.querySelector("#avatarFileSection");
        const previewDiv = document.querySelector("#avatarPreview");

        if (radio.value === 'url') {
          urlSection.style.display = 'block';
          fileSection.style.display = 'none';
          document.querySelector("#avatarFileInput").value = '';
        } else {
          urlSection.style.display = 'none';
          fileSection.style.display = 'block';
          document.querySelector("#avatarUrlInput").value = '';
          previewDiv.style.display = 'none';
        }
      });
    });

    // Preview avatar from URL
    document.querySelector("#avatarUrlInput").addEventListener("input", (e) => {
      const url = e.target.value;
      const previewImg = document.querySelector("#avatarPreviewImg");
      const previewDiv = document.querySelector("#avatarPreview");
      if (url) {
        previewImg.src = url;
        previewDiv.style.display = "block";
      } else {
        previewDiv.style.display = "none";
      }
    });

    // Preview avatar from file
    document.querySelector("#avatarFileInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      const previewImg = document.querySelector("#avatarPreviewImg");
      const previewDiv = document.querySelector("#avatarPreview");
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          previewDiv.style.display = "block";
        };
        reader.readAsDataURL(file);
      } else {
        previewDiv.style.display = "none";
      }
    });

    async function main() {
      requireAuth();
      await loadNavbar();
      await loadProfile();
    }
    main().catch(e => showToast(e.message, 'error'));
  </script>
</body>
</html>
